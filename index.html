<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأهرام للتجارة والتوزيع</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Cairo';margin:0;background:#eef2f7;padding-bottom:120px}

/* HEADER */
header{background:linear-gradient(135deg,#0b3d91,#1565c0);color:#fff;text-align:center}
.banner{width:100%;height:150px;object-fit:cover}

/* TICKER */
.ticker{background:#0b3d91;color:#fff;overflow:hidden;white-space:nowrap}
.ticker span{display:inline-block;padding:10px;animation:scrollRTL 15s linear infinite}
@keyframes scrollRTL{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

/* BUTTONS */
.tier-buttons{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:10px}
.tier-buttons button{background:#0b3d91;color:#fff;border:none;padding:8px 12px;border-radius:8px}
.offer-btn{background:#d32f2f}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:10px}

/* CARD */
.card{background:#fff;padding:10px;border-radius:10px;text-align:center}
.card img{width:100%;height:100px;object-fit:contain}

/* SELECT + INPUT */
select,input{width:90%;height:40px;margin-top:5px;border-radius:8px;text-align:center}
select{background:#e3f2fd;border:2px solid #0b3d91}
input{background:#fff3e0;border:2px solid #ff9800}

/* REVIEW */
.review-box{background:#fff;margin:10px;padding:15px;border-radius:10px;text-align:center}
.review-input{width:95%;padding:10px;margin:5px;border-radius:8px}
.big-btn{width:80%;margin:15px auto;display:block;padding:15px;background:#25d366;color:#fff;border:none;border-radius:10px;font-size:18px}

.footer{text-align:center;padding:10px;font-size:12px}
</style>
</head>

<body>

<header>
<img id="companyImage" class="banner">
<h2>الأهرام للتجارة والتوزيع</h2>
</header>

<div class="ticker"><span id="newsText"></span></div>

<div class="tier-buttons" id="tiers"></div>

<input placeholder="🔍 بحث..." oninput="searchSmart(this.value)" style="width:90%;margin:10px;padding:10px">

<div id="app"></div>

<div class="footer">تم التصميم بواسطة YaSsEr EL Joker</div>

<script>
let data=[],cart={},tier=null;

// تحميل
fetch("https://sheetdb.io/api/v1/x342u61qs0xyu")
.then(r=>r.json())
.then(res=>{
data=res;
showBrands();
});

// عرض براندات
function showBrands(){
let app=document.getElementById("app");
app.innerHTML="";
let brands=[...new Set(data.map(p=>p.company))];

let grid=document.createElement("div");
grid.className="grid";

brands.forEach(b=>{
let card=document.createElement("div");
card.className="card";
card.innerHTML=`<h3>${b}</h3>`;
card.onclick=()=>showProducts(b);
grid.appendChild(card);
});

app.appendChild(grid);
}

// عرض منتجات
function showProducts(company){
let app=document.getElementById("app");
app.innerHTML=`<h3>${company}</h3>`;
renderProducts(data.filter(p=>p.company===company));
}

// عرض
function renderProducts(list){
let app=document.getElementById("app");
let grid=document.createElement("div");
grid.className="grid";

list.forEach(p=>{
let price=parseFloat(p.price_carton);

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${p.image}">
<h4>${p.name}</h4>
<div style="color:#0b3d91;font-weight:bold">${price} جنيه</div>

<select onchange="setUnit('${p.name}',this)">
<option disabled selected>اختر الوحدة</option>
<option data-price="${price}">كرتونة</option>
</select>

<input type="number" placeholder="الكمية" onchange="setQty('${p.name}',this.value)">
`;

grid.appendChild(card);
});

app.appendChild(grid);
}

// البحث الذكي
function searchSmart(q){
q=q.toLowerCase();

let words=q.split(" ");

let results=data.filter(p=>{
let name=p.name.toLowerCase();
return words.every(w=>name.includes(w));
});

renderProducts(results);
}

// سلة
function setUnit(n,e){
if(!cart[n])cart[n]={};
cart[n].price=parseFloat(e.value||0);
}
function setQty(n,q){
if(q>0){
if(!cart[n])cart[n]={};
cart[n].qty=parseInt(q);
}else delete cart[n];
}

// مراجعة
function goReview(){
let app=document.getElementById("app");
let total=0;

let html="<h3>مراجعة الطلب</h3>";

for(let i in cart){
let p=cart[i];
let sub=p.qty*p.price;
total+=sub;

html+=`<div class="review-box">${i}<br>${p.qty} × ${p.price} = ${sub}</div>`;
}

html+=`
<h3>الإجمالي: ${total}</h3>

<div class="review-box">
<input id="name" class="review-input" placeholder="👤 الاسم">
<input id="phone" class="review-input" placeholder="📞 الموبايل">
<input id="biz" class="review-input" placeholder="🏪 اسم النشاط">
<textarea id="address" class="review-input" placeholder="📍 العنوان"></textarea>
</div>

<button class="big-btn" onclick="sendOrder(${total})">إرسال الطلب</button>
`;

app.innerHTML=html;
}

// إرسال
function sendOrder(total){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let biz=document.getElementById("biz").value;
let address=document.getElementById("address").value;

if(!name||!phone||!biz||!address){
alert("ادخل كل البيانات");
return;
}

let msg="طلب:%0A";

for(let i in cart){
let p=cart[i];
msg+=`${i} × ${p.qty} = ${p.qty*p.price}%0A`;
}

msg+=`%0Aالإجمالي: ${total}`;
msg+=`%0A👤 ${name}`;
msg+=`%0A📞 ${phone}`;
msg+=`%0A🏪 ${biz}`;
msg+=`%0A📍 ${address}`;

window.open(`https://wa.me/201552670465?text=${msg}`);
}
</script>

</body>
</html>
