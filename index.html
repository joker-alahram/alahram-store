<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأهرام للتجارة والتوزيع</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{font-family:Cairo;margin:0;background:#F5F7FA}

/* HEADER */
.header{position:relative;height:180px}
.header img{width:100%;height:100%;object-fit:cover}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.4)}
.title{position:absolute;top:15px;right:15px;color:#fff;background:#0008;padding:6px 12px;border-radius:8px}

/* NEWS SLIDER */
.news-box{background:#E53935;color:#fff;padding:10px;text-align:center;font-weight:bold}

/* TIER */
.tier-banner{background:#FFD600;text-align:center;padding:8px;font-weight:bold}
.tiers{display:flex;flex-wrap:wrap;gap:6px;padding:10px}
.tiers button{flex:1 1 30%;padding:8px;border:none;border-radius:20px;color:#fff}
.t1{background:#64B5F6}.t2{background:#42A5F5}.t3{background:#1E88E5}
.t4{background:#1565C0}.t5{background:#0D47A1}.t6{background:#002171}
.clear-btn{background:#000}

/* SEARCH */
.search{width:90%;margin:10px auto;display:block;padding:10px;border-radius:10px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}

/* CARD */
.card{background:#fff;padding:10px;border-radius:12px}
.card img{width:100%;height:100px;object-fit:contain}

.price-old{text-decoration:line-through;color:#999}
.price-new{color:#E53935;font-weight:bold}

/* BACK */
.back{background:#E53935;color:#fff;padding:10px;margin:10px;border-radius:8px;text-align:center}

/* BOTTOM */
.bottom{position:fixed;bottom:0;width:100%;background:#fff;display:flex;justify-content:space-between;padding:10px}
.review-btn{background:#0B3D91;color:#fff;padding:10px;border:none;border-radius:20px}
.back-btn{background:#000;color:#fff;padding:10px;border-radius:20px}

/* REVIEW */
.review-card{background:#fff;margin:10px;padding:10px;border-radius:10px}
.input{width:100%;padding:10px;margin:5px 0;border-radius:8px}
.send-btn{background:#0B3D91;color:#fff;padding:12px;width:80%;margin:20px auto;display:block;border:none;border-radius:20px}
</style>
</head>

<body>

<div class="header">
<img id="img">
<div class="overlay"></div>
<div class="title">الأهرام للتجارة والتوزيع</div>
</div>

<div class="news-box" id="newsBox"></div>

<div id="tierBanner"></div>
<div class="tiers" id="tiers"></div>

<input class="search" placeholder="بحث..." oninput="search(this.value)">
<div id="app"></div>

<div style="margin-bottom:80px;text-align:center;font-size:12px">
تم التصميم بواسطة YaSsEr EL Joker
</div>

<div class="bottom">
<button class="back-btn" onclick="showBrands()">⬅ رجوع</button>
<div id="total">0 جنيه</div>
<button class="review-btn" onclick="review()">🧾 مراجعة</button>
</div>

<script>
let data=[],products=[],cart={},tier=null,newsList=[],newsIndex=0;

/* LOAD */
fetch("https://sheetdb.io/api/v1/x342u61qs0xyu")
.then(r=>r.json())
.then(res=>{
data=res;
products=data.filter(p=>p.name && p.company);

document.getElementById("img").src=data.find(x=>x.company_image)?.company_image||"";

/* NEWS */
let newsText=data.find(x=>x.news)?.news||"";
newsList=newsText.split("،");
setInterval(()=>{
document.getElementById("newsBox").innerText=newsList[newsIndex];
newsIndex=(newsIndex+1)%newsList.length;
},3000);

/* INIT */
cart=JSON.parse(localStorage.getItem("cart")||"{}");
tier=JSON.parse(localStorage.getItem("tier")||"null");

loadTiers();
showBrands();
updateTotal();
});

/* TIERS */
function loadTiers(){
let t=data.filter(x=>x.tier_name && x.tier_active!="0");
let c=document.getElementById("tiers");
c.innerHTML="";

t.forEach((e,i)=>{
let b=document.createElement("button");
b.className="t"+(i+1);
b.innerText=e.tier_name;
b.onclick=()=>selectTier(e);
c.appendChild(b);
});

let clear=document.createElement("button");
clear.innerText="إلغاء";
clear.className="clear-btn";
clear.onclick=()=>{tier=null;cart={};localStorage.clear();showBrands()};
c.appendChild(clear);
}

function selectTier(t){
tier=t;
alert("تم اختيار "+t.tier_name);
localStorage.setItem("tier",JSON.stringify(t));
document.getElementById("tierBanner").innerText="أنت على "+t.tier_name;
showBrands();
}

/* BRANDS */
function showBrands(){
let app=document.getElementById("app");
app.innerHTML="";

let brands=[...new Set(products.map(p=>p.company))]
.filter(b=>!(tier && b=="صفقه اليوم"));

let grid=document.createElement("div");
grid.className="grid";

brands.forEach(b=>{
let logo=products.find(p=>p.company==b)?.brand_image;
let c=document.createElement("div");
c.className="card";
c.innerHTML=`<img src="${logo}"><h4>${b}</h4>`;
c.onclick=()=>showProducts(b);
grid.appendChild(c);
});

app.appendChild(grid);
}

/* PRODUCTS */
function showProducts(company){
if(tier && company=="صفقه اليوم"){alert("غير متاح");return showBrands()}

let app=document.getElementById("app");
app.innerHTML=`<div class="back" onclick="showBrands()">⬅ رجوع</div>`;

let list=products.filter(p=>p.company==company);
let grid=document.createElement("div");
grid.className="grid";

list.forEach(p=>{
let prices={
carton:+p.price_carton||0,
unit:+p.price_unit||0,
piece:+p.price_piece||0
};

let options="";
if(prices.carton) options+=`<option value="carton">كرتونة</option>`;
if(prices.unit) options+=`<option value="unit">دستة</option>`;
if(prices.piece) options+=`<option value="piece">قطعة</option>`;

let priceHTML=tier?
`<div class="price-old">${prices.carton}</div>
<div class="price-new">${prices.carton-(prices.carton*tier.tier_discount/100)}</div>`
:`<div>${prices.carton}</div>`;

let card=document.createElement("div");
card.className="card";
card.innerHTML=`
<img src="${p.image}">
<h4>${p.name}</h4>
${priceHTML}

<select onchange="setUnit('${p.name}',this)">
<option disabled selected>اختر الوحدة</option>
${options}
</select>

<input type="number" placeholder="الكمية" disabled
onfocus="checkUnit('${p.name}')"
oninput="setQty('${p.name}',this.value)">
`;

grid.appendChild(card);
});

app.appendChild(grid);
}

/* CART */
function setUnit(name,el){
if(!cart[name]) cart[name]={};
cart[name].unit=el.value;
el.nextElementSibling.disabled=false;
}

function checkUnit(name){
if(!cart[name]||!cart[name].unit) alert("اختر الوحدة أولا");
}

function setQty(name,qty){
let p=products.find(x=>x.name==name);
let price=p["price_"+cart[name].unit]||0;
let final=tier?price-(price*tier.tier_discount/100):price;

cart[name]={...cart[name],qty:+qty,price,final,code:p.code,unit:cart[name].unit};
localStorage.setItem("cart",JSON.stringify(cart));
updateTotal();
}

/* TOTAL */
function updateTotal(){
let t=0;
for(let i in cart) t+=cart[i].final*cart[i].qty;
document.getElementById("total").innerText=t+" جنيه";
}

/* REVIEW */
function review(){
let app=document.getElementById("app");
let html=`<div class="back" onclick="showBrands()">⬅ رجوع</div><h3>مراجعة الطلب</h3>`;

let before=0,after=0;

for(let i in cart){
let p=cart[i];
let b=p.price*p.qty;
let a=p.final*p.qty;
before+=b;after+=a;

html+=`
<div class="review-card">
<h4>[${p.code}] ${i}</h4>
<p>${p.qty} × ${p.unit} × ${p.final} = ${a}</p>
</div>`;
}

html+=tier?`<h3>قبل: ${before}</h3><h3>بعد: ${after}</h3>`:`<h3>${after}</h3>`;

html+=`
<input class="input" id="name" placeholder="الاسم">
<input class="input" id="phone" placeholder="الموبايل">
<input class="input" id="location" placeholder="اللوكيشن">
<textarea class="input" id="address" placeholder="العنوان"></textarea>

<button class="send-btn" onclick="send(${before},${after})">إرسال</button>
`;

app.innerHTML=html;
}

/* SEND */
function send(b,a){
let n=name.value,p=phone.value,l=location.value;

if(!n||!p)return alert("ادخل البيانات");

let msg="طلب:%0A";
if(tier) msg+="الشريحة: "+tier.tier_name+"%0A";

for(let i in cart){
let x=cart[i];
msg+=`[${x.code}] ${i}%0A${x.qty} × ${x.unit} × ${x.final} = ${x.final*x.qty}%0A`;
}

msg+=`%0Aلوكيشن: ${l}%0Aقبل: ${b}%0Aبعد: ${a}`;
window.open("https://wa.me/201552670465?text="+msg);
}

/* SEARCH */
function search(q){
if(!q) return showBrands();
let list=products.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()));

let app=document.getElementById("app");
app.innerHTML=`<div class="back" onclick="showBrands()">⬅ رجوع</div>`;

let grid=document.createElement("div");
grid.className="grid";

list.forEach(p=>{
let c=document.createElement("div");
c.className="card";
c.innerHTML=`<h4>${p.name}</h4>`;
grid.appendChild(c);
});

app.appendChild(grid);
}
</script>

</body>
</html>
