<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأهرام</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Cairo';margin:0;background:#eef2f7;padding-bottom:120px}

/* HEADER IMAGE */
.hero{
position:relative;
height:180px;
overflow:hidden;
}
.hero img{
width:100%;
height:100%;
object-fit:cover;
}
.overlay{
position:absolute;
top:0;
right:0;
left:0;
bottom:0;
background:rgba(0,0,0,0.35);
}
.company-name{
position:absolute;
top:15px;
right:15px;
color:#fff;
font-weight:bold;
font-size:18px;
background:rgba(0,0,0,0.4);
padding:5px 10px;
border-radius:8px;
}

/* NEWS */
.ticker{background:#c62828;color:#fff;overflow:hidden;white-space:nowrap}
.ticker span{display:inline-block;padding:10px;font-weight:bold;animation:scrollRTL 18s linear infinite}
@keyframes scrollRTL{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

/* TIER */
.tier-banner{background:#ffd600;padding:8px;text-align:center;font-weight:bold}

/* BUTTONS */
.tier-buttons{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:10px}
.tier-buttons button{border:none;padding:8px 10px;border-radius:20px;color:#fff;cursor:pointer;font-size:12px}
.offer-btn{background:#e53935}
.clear-btn{background:#000}

/* SEARCH */
.search{
width:90%;
margin:10px auto;
display:block;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:10px}

/* CARD */
.card{background:#fff;padding:10px;border-radius:12px;text-align:center;box-shadow:0 3px 10px rgba(0,0,0,0.08)}
.card img{width:100%;height:100px;object-fit:contain}

/* SELECT + INPUT */
select,input{
width:100%;
padding:8px;
border-radius:8px;
margin-top:5px;
font-weight:bold;
}
select{background:#e3f2fd;border:2px solid #0b3d91}
input{background:#fff3e0;border:2px solid #ff9800}

/* PRICE */
.old{color:#999;text-decoration:line-through;font-size:13px}
.new{color:#2e7d32;font-weight:bold}

/* REVIEW */
.review-card{background:#fff;padding:10px;margin:10px;border-radius:10px}
.review-actions button{margin:3px}

/* BOTTOM */
.bottom-bar{
position:fixed;
bottom:0;
width:100%;
background:#fff;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
border-top:1px solid #ddd;
}
.review-btn{
background:#25D366;
color:#fff;
border:none;
padding:12px 20px;
border-radius:30px;
font-size:16px;
font-weight:bold;
}

/* SEND */
.send-btn{
display:block;
margin:20px auto;
background:#0b3d91;
color:#fff;
padding:12px 30px;
border:none;
border-radius:10px;
font-size:18px;
}
</style>
</head>

<body>

<div class="hero">
<img id="companyImage">
<div class="overlay"></div>
<div class="company-name">الأهرام للتجارة والتوزيع</div>
</div>

<div class="ticker"><span id="newsText"></span></div>

<div id="tierBanner"></div>
<div class="tier-buttons" id="tiers"></div>

<input class="search" placeholder="🔍 بحث..." oninput="search(this.value)">

<div id="app"></div>

<div style="text-align:center;font-size:12px;margin-bottom:70px">
تم التصميم بواسطة YaSsEr EL Joker
</div>

<div class="bottom-bar">
<div id="total">0 جنيه</div>
<button class="review-btn" onclick="goReview()">🧾 مراجعة الطلب</button>
</div>

<script>
let data=[],cart={},tier=null,locationLink="";

fetch("https://sheetdb.io/api/v1/x342u61qs0xyu")
.then(r=>r.json())
.then(res=>{
data=res;
cart=JSON.parse(localStorage.getItem("cart")||"{}");
tier=JSON.parse(localStorage.getItem("tier")||"null");

updateTotal();
renderTiers();
updateBanner();

document.getElementById("companyImage").src=data[0].company_image||"";
document.getElementById("newsText").innerText=data[0].news||"";

showBrands();
});

function save(){
localStorage.setItem("cart",JSON.stringify(cart));
}

function renderTiers(){
let c=document.getElementById("tiers");
c.innerHTML="";
let tiers=data.filter(p=>p.tier_name && p.tier_active!="0");

tiers.forEach((t,i)=>{
let b=document.createElement("button");
b.innerText=t.tier_name;
b.style.background=`hsl(210,70%,${80-(i*8)}%)`;
b.onclick=()=>selectTier(t);
c.appendChild(b);
});

let offer=document.createElement("button");
offer.innerText="🔥 صفقة اليوم";
offer.className="offer-btn";
offer.onclick=openOffers;
c.appendChild(offer);

let clear=document.createElement("button");
clear.innerText="إلغاء الشريحة";
clear.className="clear-btn";
clear.onclick=clearTier;
c.appendChild(clear);
}

function selectTier(t){
tier=t;
cart={};
save();
localStorage.setItem("tier",JSON.stringify(tier));
updateBanner();
alert("تم اختيار "+t.tier_name);
}

function clearTier(){
tier=null;
localStorage.removeItem("tier");
updateBanner();
}

function updateBanner(){
let el=document.getElementById("tierBanner");
if(tier){
el.innerHTML=`أنت على ${tier.tier_name} - خصم ${tier.tier_discount}%`;
el.className="tier-banner";
}else el.innerHTML="";
}

function showBrands(){
let app=document.getElementById("app");
app.innerHTML="";

let brands=[...new Set(data.map(p=>p.company))];

if(tier) brands=brands.filter(b=>b!="صفقه اليوم");

let grid=document.createElement("div");
grid.className="grid";

brands.forEach(b=>{
let img=data.find(p=>p.company==b)?.brand_image;
let card=document.createElement("div");
card.className="card";
card.innerHTML=`<img src="${img}"><h4>${b}</h4>`;
card.onclick=()=>showProducts(b);
grid.appendChild(card);
});

app.appendChild(grid);
}

function showProducts(company){
let app=document.getElementById("app");
app.innerHTML=`<div onclick="showBrands()" style="margin:10px;color:red">⬅ رجوع</div><h3>${company}</h3>`;
let list=data.filter(p=>p.company==company);
renderProducts(list);
}

function openOffers(){
if(tier){alert("غير متاح مع الشريحة");return;}
showProducts("صفقه اليوم");
}

function search(q){
q=q.toLowerCase();
if(!q){showBrands();return;}
let list=data.filter(p=>p.name.toLowerCase().includes(q));
renderProducts(list);
}

function renderProducts(list){
let app=document.getElementById("app");
let grid=document.createElement("div");
grid.className="grid";

list.forEach(p=>{
let price=parseFloat(p.price_carton);
let discount=tier?price*(tier.tier_discount/100):0;
let final=price-discount;

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${p.image}">
<h4>${p.name}</h4>
<div class="old">${price}</div>
<div class="new">${final}</div>

<select onchange="setUnit('${p.name}',this)">
<option disabled selected>الوحدة</option>
<option data-price="${final}">كرتونة</option>
</select>

<input type="number" placeholder="الكمية" onchange="setQty('${p.name}',this.value)">
`;

grid.appendChild(card);
});

app.innerHTML+=grid.outerHTML;
}

function setUnit(n,el){
let price=el.options[el.selectedIndex].dataset.price;
if(!cart[n]) cart[n]={};
cart[n].price=+price;
cart[n].unit=el.value;
save();updateTotal();
}

function setQty(n,q){
q=parseInt(q);
if(q>0){
if(!cart[n]) cart[n]={};
cart[n].qty=q;
}else delete cart[n];
save();updateTotal();
}

function updateTotal(){
let t=0;
for(let i in cart){
let p=cart[i];
if(p.price&&p.qty) t+=p.price*p.qty;
}
document.getElementById("total").innerText=t+" جنيه";
}

function goReview(){
let app=document.getElementById("app");
let total=0,html="<h3>مراجعة الطلب</h3>";

for(let i in cart){
let p=cart[i];
let sub=p.price*p.qty;
total+=sub;

html+=`
<div class="review-card">
${i}<br>
${p.qty} × ${p.unit} = ${sub}
<div class="review-actions">
<button onclick="setQty('${i}',${p.qty+1})">+</button>
<button onclick="setQty('${i}',${p.qty-1})">-</button>
<button onclick="delete cart['${i}'];save();goReview();updateTotal()">حذف</button>
</div>
</div>`;
}

html+=`
<input id="name" placeholder="الاسم">
<input id="phone" placeholder="التليفون">
<input id="activity" placeholder="النشاط">
<textarea id="address" placeholder="العنوان"></textarea>

<button onclick="getLocation()">📍 الموقع</button>
<p id="loc"></p>

<button class="send-btn" onclick="sendOrder(${total})">إرسال الطلب</button>
`;

app.innerHTML=html;
}

function getLocation(){
navigator.geolocation.getCurrentPosition(p=>{
locationLink=`https://maps.google.com/?q=${p.coords.latitude},${p.coords.longitude}`;
document.getElementById("loc").innerText="تم تحديد الموقع";
});
}

function sendOrder(total){
let n=name.value,ph=phone.value,a=activity.value,ad=address.value;

if(!n||!ph||!a||!ad){
alert("فضلا ادخل البيانات كاملة");return;
}

if(tier && total<tier.tier_min){
alert("لم تحقق شرط الشريحة");return;
}

let msg="طلب جديد%0A";
if(tier) msg+=`الشريحة: ${tier.tier_name}%0A`;

for(let i in cart){
let p=cart[i];
msg+=`${i} ${p.qty}×${p.unit}=${p.price*p.qty}%0A`;
}

msg+=`الإجمالي: ${total}%0A${n}%0A${ph}%0A${a}%0A${ad}`;

if(locationLink) msg+=`%0A${locationLink}`;

window.open(`https://wa.me/201552670465?text=${msg}`);
}
</script>

</body>
</html>
