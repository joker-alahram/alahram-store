<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأهرام للتجارة والتوزيع</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {font-family:'Cairo';margin:0;background:#eef2f7;padding-bottom:120px}

/* الهيدر */
header {
  background:linear-gradient(135deg,#0b3d91,#1565c0);
  color:#fff;
  text-align:center;
}
.banner {width:100%;height:150px;object-fit:cover}

/* شريط الأخبار */
.ticker {
  background:#0b3d91;
  color:#fff;
  overflow:hidden;
  white-space:nowrap;
}
.ticker span {
  display:inline-block;
  padding:10px;
  animation:scrollRTL 15s linear infinite;
}
@keyframes scrollRTL {
  from{transform:translateX(-100%)}
  to{transform:translateX(100%)}
}

/* تنبيه الشريحة */
.tier-banner {
  background:#ffeb3b;
  padding:8px;
  text-align:center;
  font-weight:bold;
}

/* الأزرار */
.tier-buttons {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  padding:10px;
}
.tier-buttons button {
  background:#0b3d91;
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}
.clear-tier {background:#e53935}
.offer-btn {background:#ff9800}

/* الرجوع */
.back-inline {
  display:inline-block;
  background:#e53935;
  color:#fff;
  padding:8px 14px;
  border-radius:8px;
  margin:10px;
  cursor:pointer;
}

/* الشبكة */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:10px;
  padding:10px;
}

/* الكروت */
.card {background:#fff;padding:10px;border-radius:10px;text-align:center}
.card img {width:100%;height:100px;object-fit:contain}

/* اختيار الوحدة */
select {
  background:#e3f2fd;
  border:2px solid #0b3d91;
  font-weight:bold;
}

/* الكمية */
input[type=number] {
  background:#fff3e0;
  border:2px solid #ff9800;
  font-weight:bold;
}

/* أسفل */
.bottom-bar {
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  padding:10px;
  display:flex;
  justify-content:space-between;
  border-top:1px solid #ddd;
}
</style>
</head>

<body>

<header>
<img id="companyImage" class="banner">
<h2>الأهرام للتجارة والتوزيع</h2>
</header>

<div class="ticker"><span id="newsText"></span></div>

<div id="tierBanner"></div>

<div class="tier-buttons" id="tiers"></div>

<input placeholder="🔍 بحث..." oninput="globalSearch(this.value)" style="width:90%;margin:10px">

<div id="app"></div>

<div class="bottom-bar">
<div id="total">0 جنيه</div>
<button onclick="goReview()">مراجعة الطلب</button>
</div>

<script>
let data=[],cart={},tier=null,locationLink="";

// تحميل البيانات
fetch("https://sheetdb.io/api/v1/x342u61qs0xyu")
.then(r=>r.json())
.then(res=>{
data=res;

// صورة الشركة
let img=data.find(p=>p.company_image)?.company_image;
if(img) document.getElementById("companyImage").src=img;

// الشريط
let news=data.find(p=>p.news)?.news;
if(news) document.getElementById("newsText").innerText=news;

// الشرائح
loadTiers();

showBrands();
});

// تحميل الشرائح
function loadTiers(){
let tiers=data.filter(p=>p.tier_name);

let container=document.getElementById("tiers");
container.innerHTML="";

tiers.forEach(t=>{
let btn=document.createElement("button");
btn.innerText=t.tier_name;
btn.onclick=()=>selectTier(t);
container.appendChild(btn);
});

// زر العروض
let offer=document.createElement("button");
offer.className="offer-btn";
offer.innerText="صفقة اليوم";
offer.onclick=()=>openOffers();
container.appendChild(offer);

// زر إلغاء
let clear=document.createElement("button");
clear.className="clear-tier";
clear.innerText="إلغاء الشريحة";
clear.onclick=clearTier;
container.appendChild(clear);
}

// اختيار شريحة
function selectTier(t){
tier=t;
localStorage.setItem("tier",JSON.stringify(t));
updateTierBanner();

// حذف أي منتجات عروض
for(let i in cart){
if(cart[i].isOffer) delete cart[i];
}

alert("تم اختيار "+t.tier_name);
}

// إلغاء الشريحة
function clearTier(){
tier=null;
localStorage.removeItem("tier");
updateTierBanner();
}

// عرض التنبيه
function updateTierBanner(){
let el=document.getElementById("tierBanner");
if(tier){
el.innerHTML=`أنت على ${tier.tier_name} - الحد الأدنى ${tier.tier_min}`;
el.className="tier-banner";
}else{
el.innerHTML="";
}
}

// الرئيسية
function showBrands(){
const app=document.getElementById("app");
app.innerHTML="";

let brands=[...new Set(data.map(p=>p.company))];

let grid=document.createElement("div");
grid.className="grid";

brands.forEach(b=>{
let card=document.createElement("div");
card.className="card";
card.innerHTML=`<h3>${b}</h3>`;
card.onclick=()=>showProducts(b);
grid.appendChild(card);
});

app.appendChild(grid);
}

// منتجات
function showProducts(company){
const app=document.getElementById("app");

app.innerHTML=`
<div class="back-inline" onclick="showBrands()">⬅ اضغط للرجوع</div>
<h3>${company}</h3>
`;

let list=data.filter(p=>p.company===company);
renderProducts(list);
}

// العروض
function openOffers(){
if(tier){
alert("لا يمكن دخول العروض أثناء اختيار شريحة");
return;
}
showProducts("عروض");
}

// البحث الذكي
function globalSearch(q){
q=q.toLowerCase();

if(!q){showBrands();return;}

let results=data.filter(p=>{
let name=p.name.toLowerCase();
return name.includes(q);
});

const app=document.getElementById("app");
app.innerHTML=`<div class="back-inline" onclick="showBrands()">⬅ رجوع</div>`;
renderProducts(results);
}

// عرض المنتجات
function renderProducts(list){
const app=document.getElementById("app");

let grid=document.createElement("div");
grid.className="grid";

list.forEach(p=>{

let carton=parseFloat(p.price_carton);
let unit=parseFloat(p.price_unit);
let piece=parseFloat(p.price_piece);

let options="";
if(!isNaN(carton)) options+=`<option data-price="${carton}">كرتونة</option>`;
if(!isNaN(unit)) options+=`<option data-price="${unit}">دستة</option>`;
if(!isNaN(piece)) options+=`<option data-price="${piece}">قطعة</option>`;

let status=(p.status||"").trim()=="0" ? "نفذت الكمية ستصل قريبا" : "";

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${p.image}">
<h4>${p.name}</h4>
<div>${status}</div>

<select onchange="setUnit('${p.name}',this)">
<option disabled selected>اختر الوحدة</option>
${options}
</select>

<input type="number" placeholder="ادخل الكمية"
onchange="setQty('${p.name}',this.value)">
`;

grid.appendChild(card);
});

app.appendChild(grid);
}

// السلة
function setUnit(name,el){
let price=el.options[el.selectedIndex].getAttribute("data-price");
if(!cart[name]) cart[name]={};
cart[name].price=parseFloat(price);
cart[name].unit=el.value;
updateTotal();
}

function setQty(name,qty){
qty=parseInt(qty);
if(qty>0){
if(!cart[name]) cart[name]={};
cart[name].qty=qty;
}else delete cart[name];

updateTotal();
}

// الإجمالي
function updateTotal(){
let total=0;
for(let i in cart){
let p=cart[i];
if(p.price && p.qty) total+=p.price*p.qty;
}
document.getElementById("total").innerText=total+" جنيه";
}

// مراجعة
function goReview(){
const app=document.getElementById("app");

let total=0;
let html=`<div class="back-inline" onclick="showBrands()">⬅ رجوع</div><h3>مراجعة الطلب</h3>`;

for(let i in cart){
let p=cart[i];
total+=p.price*p.qty;

html+=`<div>${i} × ${p.qty} (${p.unit}) - ${p.price*p.qty}</div>`;
}

// تطبيق الخصم
let discount=0;
if(tier && total>=parseFloat(tier.tier_min)){
discount=total*(parseFloat(tier.tier_discount)/100);
}

let net=total-discount;

html+=`
<h3>الإجمالي: ${total}</h3>
<h3>الخصم: ${discount}</h3>
<h3>الصافي: ${net}</h3>

<input id="name" placeholder="الاسم">
<input id="phone" placeholder="الموبايل">
<textarea id="address" placeholder="العنوان"></textarea>

<button onclick="getLocation()">📍 تحديد الموقع</button>
<p id="loc"></p>

<button onclick="sendOrder(${net},${total},${discount})">إرسال</button>
`;

app.innerHTML=html;
}

// الموقع
function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
locationLink=`https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
document.getElementById("loc").innerText="تم تحديد الموقع";
});
}

// إرسال
function sendOrder(net,total,discount){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

if(!name || !phone || !address){
alert("فضلا ادخل البيانات كامله");
return;
}

// شرط الشريحة
if(tier && total<parseFloat(tier.tier_min)){
alert("لم تحقق شرط الشريحة");
return;
}

let msg="طلب:%0A";

for(let i in cart){
let p=cart[i];
msg+=`${i} × ${p.qty} (${p.unit}) = ${p.price*p.qty}%0A`;
}

msg+=`%0Aالإجمالي: ${total}`;
msg+=`%0Aالخصم: ${discount}`;
msg+=`%0Aالصافي: ${net}`;

if(tier){
msg+=`%0Aالشريحة: ${tier.tier_name}`;
}

if(locationLink){
msg+=`%0Aالموقع: ${locationLink}`;
}

window.open(`https://wa.me/201552670465?text=${msg}`);
}
</script>

</body>
</html>
