<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأهرام للتجارة والتوزيع</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{font-family:Cairo;margin:0;background:#f5f7fa}
.header{height:160px;position:relative}
.header img{width:100%;height:100%;object-fit:cover}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.4)}
.title{position:absolute;top:10px;right:10px;color:#fff}

.ticker{background:#E53935;color:#fff;padding:10px;text-align:center;font-weight:bold}

.search{width:90%;margin:10px auto;display:block;padding:10px;border-radius:10px;border:1px solid #ccc}

.tiers{display:flex;flex-wrap:wrap;gap:5px;padding:10px}
.tiers button{flex:1;border:none;padding:8px;border-radius:20px;background:#0B3D91;color:#fff}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:#fff;padding:10px;border-radius:12px}
.card img{width:100%;height:100px;object-fit:contain}

select,input{width:100%;padding:6px;margin-top:5px;border-radius:8px;border:1px solid #ccc}

.back{background:#E53935;color:#fff;padding:8px;margin:10px;text-align:center;border-radius:8px}

.bottom{position:fixed;bottom:0;width:100%;background:#fff;display:flex;justify-content:space-between;padding:10px;border-top:1px solid #ddd}
</style>
</head>

<body>

<div class="header">
<img id="img">
<div class="overlay"></div>
<div class="title">الأهرام للتجارة والتوزيع</div>
</div>

<div class="ticker" id="news">...</div>

<input class="search" placeholder="بحث..." oninput="search(this.value)">

<div class="tiers" id="tiers"></div>
<div id="app"></div>

<div class="bottom">
<div id="total">0 جنيه</div>
<button onclick="review()">مراجعة</button>
</div>

<script>

let products=[],tiers=[],settings=[];
let cart={},tier=null;

/* ================= LOAD DATA ================= */

Promise.all([
fetch("https://sheetdb.io/api/v1/nblnpi58q9ipb?sheet=Products").then(r=>r.json()),
fetch("https://sheetdb.io/api/v1/nblnpi58q9ipb?sheet=Tiers").then(r=>r.json()),
fetch("https://sheetdb.io/api/v1/nblnpi58q9ipb?sheet=Settings").then(r=>r.json())
]).then(([p,t,s])=>{

products = p.filter(x=>x.status=="active");

tiers = t
  .filter(x=>x.tier_active=="1")
  .map(x=>({
    ...x,
    tier_discount:+x.tier_discount
  }));

settings = s;

/* HEADER */
let header = settings.find(x=>x.type=="company_image");
if(header) document.getElementById("img").src = header.value;

/* NEWS */
let newsList = settings.filter(x=>x.type=="news").map(x=>x.value);
startSlider(newsList);

/* UI */
loadTiers();
showBrands();

});

/* ================= NEWS SLIDER ================= */

function startSlider(list){
if(!list.length) return;
let i=0;
setInterval(()=>{
document.getElementById("news").innerText=list[i];
i=(i+1)%list.length;
},3000);
}

/* ================= TIERS ================= */

function loadTiers(){
let c=document.getElementById("tiers");
c.innerHTML="";
tiers.forEach(t=>{
let b=document.createElement("button");
b.innerText=t.tier_name;
b.onclick=()=>{
tier=t;
localStorage.setItem("tier",JSON.stringify(t));
showBrands();
};
c.appendChild(b);
});
}

/* ================= BRANDS ================= */

function showBrands(){
let app=document.getElementById("app");
app.innerHTML="";

let brands=[...new Set(products.map(p=>p.company))];

let grid=document.createElement("div");
grid.className="grid";

brands.forEach(b=>{
let c=document.createElement("div");
c.className="card";
c.innerHTML=`<h4>${b}</h4>`;
c.onclick=()=>showProducts(b);
grid.appendChild(c);
});

app.appendChild(grid);
}

/* ================= PRODUCTS ================= */

function showProducts(company){
let app=document.getElementById("app");

app.innerHTML=`<div class="back" onclick="showBrands()">⬅ رجوع</div>`;

let list=products.filter(p=>p.company==company);

let grid=document.createElement("div");
grid.className="grid";

list.forEach(p=>{

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${p.image}">
<h4>${p.name}</h4>

<select onchange="setUnit('${p.code}',this.value)">
<option disabled selected>اختر الوحدة</option>
${p.price_carton?'<option value="carton">كرتونة</option>':''}
${p.price_dozen?'<option value="dozen">دستة</option>':''}
${p.price_piece?'<option value="piece">قطعة</option>':''}
</select>

<input type="number" placeholder="الكمية" oninput="setQty('${p.code}',this.value)">
`;

grid.appendChild(card);
});

app.appendChild(grid);
}

/* ================= CART ================= */

function setUnit(code,unit){
if(!cart[code]) cart[code]={};
cart[code].unit=unit;
}

function setQty(code,qty){
if(!cart[code] || !cart[code].unit) return alert("اختار الوحدة الأول");

let p=products.find(x=>x.code==code);
let price = +p["price_"+cart[code].unit] || 0;

if(tier){
price = price - (price*(tier.tier_discount/100));
}

cart[code]={...cart[code],qty:+qty,price};

updateTotal();
}

/* ================= TOTAL ================= */

function updateTotal(){
let t=0;
for(let i in cart){
t+=cart[i].price*cart[i].qty;
}
document.getElementById("total").innerText=t+" جنيه";
}

/* ================= REVIEW ================= */

function review(){
let msg="طلب:%0A";

if(tier) msg+=`الشريحة: ${tier.tier_name}%0A`;

for(let i in cart){
let x=cart[i];
msg+=`${i} - ${x.qty} × ${x.price} = ${x.qty*x.price}%0A`;
}

window.open("https://wa.me/201552670465?text="+msg);
}

/* ================= SEARCH ================= */

function search(q){
if(!q) return showBrands();

let app=document.getElementById("app");

let list=products.filter(p=>
p.name.toLowerCase().includes(q.toLowerCase())
);

let grid=document.createElement("div");
grid.className="grid";

list.forEach(p=>{
let c=document.createElement("div");
c.className="card";
c.innerHTML=`<h4>${p.name}</h4>`;
grid.appendChild(c);
});

app.innerHTML="";
app.appendChild(grid);
}

</script>

</body>
</html>
