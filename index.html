<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0A6E5C">
<title>منصة التوزيع B2B</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--p:#0A6E5C;--pd:#075C4B;--pl:#E6F5F1;
--ac:#D97706;--acd:#B45309;--acl:#FEF3C7;
--bg:#F3F1ED;--sf:#FFF;--sf2:#FAFAF8;
--tx:#1C1917;--tx2:#57534E;--tx3:#A8A29E;
--bd:#E7E5E4;--bd2:#F5F5F4;
--err:#DC2626;--errl:#FEE2E2;--ok:#16A34A;--okl:#DCFCE7;
--r:10px;--r2:14px;--r3:20px;--rf:50px;
--hh:52px;--bnh:60px;--sfb:env(safe-area-inset-bottom,0px);
--f:'Cairo',system-ui,sans-serif;
}
html{font-size:16px;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
body{font-family:var(--f);background:var(--bg);color:var(--tx);line-height:1.5;overflow-x:hidden;min-height:100dvh}
#root{min-height:100dvh;display:flex;flex-direction:column}
img{display:block;max-width:100%}
button{font-family:var(--f);cursor:pointer;border:none;background:none;-webkit-appearance:none}
input{font-family:var(--f);-webkit-appearance:none;appearance:none;outline:none}
::-webkit-scrollbar{width:0;height:0}
.shell{display:flex;flex-direction:column;min-height:100dvh}
.fhead{position:sticky;top:0;z-index:100;height:var(--hh);background:var(--p);display:flex;align-items:center;padding:0 14px;gap:10px;box-shadow:0 2px 8px rgba(10,110,92,.18)}
.fhead .logo{color:#fff;font-size:16px;font-weight:800;flex:1}
.fhead .logo small{color:#A7F3D0;font-weight:400;font-size:10px;display:block;margin-top:-1px}
.hbtn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;position:relative}
.hbtn:active{background:rgba(255,255,255,.15)}
.hbtn .bdg{position:absolute;top:2px;right:2px;min-width:16px;height:16px;border-radius:8px;background:var(--ac);color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 3px;border:1.5px solid var(--p)}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--bnh)+var(--sfb)+4px)}
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;height:calc(var(--bnh)+var(--sfb));padding-bottom:var(--sfb);background:var(--sf);border-top:1px solid var(--bd);display:flex}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;color:var(--tx3);transition:color .15s;position:relative}
.ni.on{color:var(--p)}
.ni .mi{font-size:22px}
.ni small{font-size:9px;font-weight:600}
.ni .nb{position:absolute;top:4px;right:calc(50%-14px);min-width:14px;height:14px;border-radius:7px;background:var(--err);color:#fff;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 3px}
.cd{background:var(--sf);border-radius:var(--r2);box-shadow:0 1px 2px rgba(0,0,0,.05);overflow:hidden;border:1px solid var(--bd2)}
.bt{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 18px;border-radius:var(--r);font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap}
.bt:active{transform:scale(.97)}
.bt:disabled{opacity:.4;pointer-events:none}
.bt-p{background:var(--p);color:#fff}
.bt-p:active{background:var(--pd)}
.bt-a{background:var(--ac);color:#fff}
.bt-a:active{background:var(--acd)}
.bt-o{border:1.5px solid var(--bd);color:var(--tx);background:var(--sf)}
.bt-s{padding:5px 12px;font-size:11px;border-radius:7px}
.bt-f{width:100%}
.bt-l{padding:13px 24px;font-size:15px;border-radius:var(--r2)}
.bdg-i{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600;line-height:1.3}
.bdg-p{background:var(--pl);color:var(--pd)}
.bdg-a{background:var(--acl);color:var(--acd)}
.bdg-ok{background:var(--okl);color:var(--ok)}
.sh{display:flex;align-items:center;justify-content:space-between;padding:16px 14px 10px}
.sh h2{font-size:15px;font-weight:700}
.sh .lk{font-size:12px;color:var(--p);font-weight:600;display:flex;align-items:center;gap:2px}
.sh .lk .mi{font-size:14px}
.flban{margin:10px 14px;border-radius:var(--r3);overflow:hidden;position:relative;background:linear-gradient(135deg,#1C1917,#292524);min-height:148px}
.flban::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(217,119,6,.25),transparent);pointer-events:none}
.flban-c{position:relative;z-index:1;padding:16px;display:flex;gap:14px}
.flban-t{flex:1;display:flex;flex-direction:column;justify-content:center}
.fll{display:inline-flex;align-items:center;gap:3px;background:var(--ac);color:#fff;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:700;width:fit-content;margin-bottom:6px;animation:pg 2s infinite}
@keyframes pg{0%,100%{box-shadow:0 0 0 0 rgba(217,119,6,.4)}50%{box-shadow:0 0 0 6px rgba(217,119,6,0)}}
.flban-t h3{color:#fff;font-size:14px;font-weight:700;margin-bottom:3px;line-height:1.4}
.flban-t p{color:#78716C;font-size:11px;margin-bottom:10px}
.ftm{display:flex;gap:5px;direction:ltr}
.ftb{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.08);border-radius:7px;padding:3px 7px;text-align:center;min-width:38px}
.ftb .fn{color:#fff;font-size:16px;font-weight:800;line-height:1.2}
.ftb .fl{color:#78716C;font-size:8px;font-weight:500}
.fts{color:var(--ac);font-size:16px;font-weight:700;display:flex;align-items:center}
.flban-i{width:90px;height:90px;border-radius:var(--r);object-fit:cover;align-self:center;border:2px solid rgba(217,119,6,.25)}
.dsl{display:flex;gap:10px;padding:0 14px 4px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.dsc{min-width:148px;max-width:148px;scroll-snap-align:start}
.dsc .cd{height:100%}
.dsc-i{width:100%;height:100px;object-fit:cover;background:var(--bg)}
.dsc-b{padding:8px 9px}
.dsc-b h4{font-size:11px;font-weight:600;line-height:1.35;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:30px}
.dp{font-size:15px;font-weight:800;color:var(--acd);margin-bottom:5px}
.dst{font-size:9px;color:var(--tx3);margin-bottom:5px}
.dstb{height:3px;background:var(--bd2);border-radius:2px;overflow:hidden;margin-bottom:7px}
.dstbf{height:100%;background:var(--ac);border-radius:2px;transition:width .5s}
.tier-hero{margin:10px 14px;padding:16px;border-radius:var(--r2);background:linear-gradient(135deg,var(--p),#15803D);color:#fff;position:relative;overflow:hidden}
.tier-hero::after{content:'';position:absolute;top:-20px;left:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.06)}
.tier-hero h3{font-size:14px;font-weight:700;margin-bottom:4px;position:relative}
.tier-hero .disc{font-size:22px;font-weight:900;position:relative}
.tier-hero .disc span{font-size:13px;font-weight:400}
.tier-hero .minfo{font-size:10px;opacity:.8;margin-top:4px;position:relative}
.tier-pb{margin:0 14px 8px;padding:12px;background:var(--sf);border-radius:var(--r);border:1px solid var(--bd2)}
.tier-pb .lr{display:flex;justify-content:space-between;margin-bottom:6px;font-size:11px}
.tier-pb .cur{color:var(--tx2);font-weight:500}
.tier-pb .tgt{color:var(--p);font-weight:700}
.pbar{height:7px;background:var(--bd2);border-radius:4px;overflow:hidden}
.pbarf{height:100%;border-radius:4px;transition:width .5s;background:linear-gradient(90deg,var(--p),#34D399)}
.cats-g{display:flex;gap:8px;padding:0 14px 8px;overflow-x:auto}
.cat-chip{min-width:max-content;padding:7px 14px;border-radius:var(--rf);font-size:11px;font-weight:600;border:1.5px solid var(--bd);color:var(--tx2);background:var(--sf);transition:all .15s}
.cat-chip.on{background:var(--p);color:#fff;border-color:var(--p)}
.cmp-s{display:flex;gap:10px;padding:0 14px 8px;overflow-x:auto}
.cmp-c{min-width:100px;max-width:100px;text-align:center;padding:10px 8px;background:var(--sf);border-radius:var(--r);border:1px solid var(--bd2)}
.cmp-c .ci{width:40px;height:40px;border-radius:50%;background:var(--pl);display:flex;align-items:center;justify-content:center;margin:0 auto 6px}
.cmp-c .ci .mi{font-size:20px;color:var(--p)}
.cmp-c small{font-size:9px;font-weight:600;color:var(--tx2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3}
.pgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 14px 14px}
.pc{background:var(--sf);border-radius:var(--r2);overflow:hidden;border:1px solid var(--bd2);box-shadow:0 1px 2px rgba(0,0,0,.05);transition:transform .15s}
.pc:active{transform:scale(.97)}
.pc-i{width:100%;height:120px;object-fit:cover;background:var(--bg)}
.pc-b{padding:8px 9px}
.pc-b .cat{font-size:9px;color:var(--tx3);margin-bottom:3px}
.pc-b h4{font-size:11.5px;font-weight:600;line-height:1.35;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:31px}
.pc-b .cmp-n{font-size:9px;color:var(--tx3);margin-bottom:5px}
.pp-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.pp-t{font-size:10px;padding:2px 6px;border-radius:5px;font-weight:700}
.pp-t.ct{background:var(--pl);color:var(--pd)}
.pp-t.pk{background:#F0FDF4;color:#15803D}
.pc .ab{width:100%;padding:6px;border-radius:7px;background:var(--p);color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:3px}
.pc .ab:active{background:var(--pd)}
.pc .ab .mi{font-size:14px}
.qa-row{display:flex;gap:4px;margin-top:6px}
.qa-row .bt{flex:1;padding:5px 0;font-size:10px;border-radius:6px}
.ti-c{font-size:9px;color:var(--tx3);margin-top:3px;display:flex;align-items:center;gap:2px}
.ti-c .mi{font-size:11px;color:var(--p)}
.dt-h{position:relative}
.dt-i{width:100%;height:260px;object-fit:cover;background:var(--bg)}
.dt-bk{position:absolute;top:10px;right:10px;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;color:#fff}
.dt-b{padding:18px 14px}
.dt-b h1{font-size:18px;font-weight:800;line-height:1.5;margin-bottom:5px}
.dt-m{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.dt-inf{background:var(--sf2);border-radius:var(--r);padding:14px;margin-bottom:14px}
.uo{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--bd2);cursor:pointer}
.uo:last-child{border:none;padding-bottom:0}
.uo:first-child{padding-top:0}
.uo .ul{display:flex;flex-direction:column;gap:1px}
.uo .un{font-size:13px;font-weight:600}
.uo .uh{font-size:10px;color:var(--tx3)}
.uo .up{font-size:17px;font-weight:800;color:var(--p)}
.qr{display:flex;align-items:center;justify-content:space-between;padding:14px;background:var(--sf2);border-radius:var(--r);margin-bottom:14px}
.qr .ql{font-size:13px;font-weight:600}
.qc{display:flex;align-items:center;gap:10px}
.qb{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;color:var(--tx);font-size:18px;font-weight:500}
.qb:active{background:var(--bg);border-color:var(--p)}
.qv{font-size:17px;font-weight:700;min-width:28px;text-align:center}
.tot-row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:var(--pl);border-radius:var(--r);margin-bottom:14px}
.tot-row .tl{font-size:13px;font-weight:600;color:var(--pd)}
.tot-row .tv{font-size:20px;font-weight:900;color:var(--p)}
.sbar{margin:10px 14px;position:relative}
.sbar input{width:100%;height:42px;border-radius:var(--rf);border:1.5px solid var(--bd);padding:0 14px 0 40px;font-size:13px;background:var(--sf);transition:border-color .15s}
.sbar input:focus{border-color:var(--p)}
.sbar input::placeholder{color:var(--tx3)}
.sbar .si{position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:18px;pointer-events:none}
.ftabs{display:flex;gap:6px;padding:0 14px 10px;overflow-x:auto}
.ftab{padding:6px 13px;border-radius:var(--rf);font-size:11px;font-weight:600;white-space:nowrap;border:1.5px solid var(--bd);color:var(--tx2);background:var(--sf);transition:all .15s}
.ftab.on{background:var(--p);color:#fff;border-color:var(--p)}
.tier-sel{margin:0 14px 10px}
.tier-sel h3{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.tier-sel h3 .mi{font-size:16px;color:var(--p)}
.tier-sc{display:flex;gap:7px;overflow-x:auto;padding-bottom:3px}
.tc{min-width:120px;padding:10px;border-radius:var(--r);border:2px solid var(--bd);background:var(--sf);cursor:pointer;transition:all .15s;flex-shrink:0}
.tc.on{border-color:var(--p);background:var(--pl)}
.tc .tn{font-size:12px;font-weight:700;margin-bottom:3px}
.tc .td{font-size:10px;color:var(--acd);font-weight:600;margin-bottom:3px}
.tc .tm{font-size:9px;color:var(--tx3)}
.tc .tck{font-size:13px;color:var(--p);margin-top:3px}
.csc{margin:0 14px 10px;padding:14px;background:var(--sf);border-radius:var(--r2);border:1px solid var(--bd2)}
.ci-row{display:flex;gap:10px;padding:12px 14px;border-bottom:1px solid var(--bd2);align-items:center}
.ci-row:last-child{border-bottom:none}
.ci-i{width:56px;height:56px;border-radius:var(--r);object-fit:cover;background:var(--bg);flex-shrink:0}
.ci-nfo{flex:1;min-width:0}
.ci-nfo h4{font-size:12px;font-weight:600;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-nfo .ul{font-size:10px;color:var(--tx3);margin-bottom:3px}
.ci-nfo .pr{font-size:13px;font-weight:700;color:var(--p)}
.ci-act{display:flex;flex-direction:column;align-items:center;gap:3px}
.ci-act .rb{color:var(--tx3);font-size:15px;padding:1px}
.ci-act .rb:active{color:var(--err)}
.ci-act .qm{display:flex;align-items:center;gap:7px}
.ci-act .qm button{width:26px;height:26px;border-radius:50%;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--tx)}
.ci-act .qm span{font-size:13px;font-weight:700;min-width:18px;text-align:center}
.bkdn{padding:0}
.bkdn-r{display:flex;justify-content:space-between;padding:7px 0;font-size:12px;color:var(--tx2)}
.bkdn-r.tot{border-top:2px solid var(--tx);padding-top:10px;margin-top:3px;font-size:15px;font-weight:800;color:var(--tx)}
.bkdn-r .v{font-weight:600;color:var(--tx)}
.bkdn-r.tot .v{color:var(--p)}
.ckbar{position:sticky;bottom:calc(var(--bnh)+var(--sfb));padding:10px 14px;background:var(--sf);border-top:1px solid var(--bd);box-shadow:0 -2px 10px rgba(0,0,0,.04);z-index:50}
.offer-ft{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-top:1px solid var(--bd2);background:var(--acl)}
.offer-ft .ofp{font-size:18px;font-weight:900;color:var(--acd)}
.oc{margin:6px 14px;padding:14px;background:var(--sf);border-radius:var(--r2);border:1px solid var(--bd2)}
.oc-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.oc-h .on{font-size:12px;font-weight:700}
.oc-b{display:flex;justify-content:space-between;margin-bottom:8px}
.oc-b .st{text-align:center}
.oc-b .st .sv{font-size:15px;font-weight:800}
.oc-b .st .sl{font-size:9px;color:var(--tx3)}
.oc-f{display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid var(--bd2)}
.oc-f .ot{font-size:15px;font-weight:800;color:var(--p)}
.tst-c{position:fixed;top:calc(var(--hh)+6px);left:14px;right:14px;z-index:1000;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.tst{padding:10px 14px;border-radius:var(--r);font-size:12px;font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.12);pointer-events:auto;animation:ti .25s ease;display:flex;align-items:center;gap:6px}
.tst.ok{background:#065F46;color:#fff}
.tst.er{background:#991B1B;color:#fff}
.tst.in{background:var(--tx);color:#fff}
.tst .mi{font-size:16px}
@keyframes ti{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 28px;text-align:center}
.empty .mi{font-size:56px;color:var(--bd);margin-bottom:14px}
.empty h3{font-size:15px;font-weight:700;color:var(--tx2);margin-bottom:5px}
.empty p{font-size:12px;color:var(--tx3);line-height:1.5}
.suc{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 28px;text-align:center;min-height:55vh}
.suc-i{width:72px;height:72px;border-radius:50%;background:var(--okl);display:flex;align-items:center;justify-content:center;margin-bottom:18px;animation:pi .35s ease}
.suc-i .mi{font-size:36px;color:var(--ok)}
@keyframes pi{0%{transform:scale(0)}60%{transform:scale(1.12)}100%{transform:scale(1)}}
.suc h2{font-size:20px;font-weight:800;margin-bottom:6px}
.suc p{font-size:13px;color:var(--tx2);margin-bottom:3px}
.suc .onum{font-size:17px;font-weight:800;color:var(--p);margin:10px 0 24px}
.skel{background:linear-gradient(90deg,var(--bd2) 25%,var(--bg) 50%,var(--bd2) 75%);background-size:200% 100%;animation:sh 1.5s infinite;border-radius:var(--r)}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.note{margin:0 14px 10px;padding:9px 12px;background:var(--acl);border-radius:var(--r);font-size:10px;color:var(--acd);display:flex;gap:5px;align-items:flex-start;line-height:1.5}
.note.en{background:var(--errl);color:var(--err)}
.pg-in{animation:pgi .2s ease}
@keyframes pgi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.o50{opacity:.5}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>

<div id="root"></div>
<div id="errbox" style="display:none;position:fixed;inset:0;z-index:99999;background:#fff;padding:40px 20px;text-align:center;font-family:monospace;color:#DC2626;font-size:14px;overflow:auto"></div>
<script>
window.onerror=function(m,s,l){var d=document.getElementById('errbox');if(d){d.style.display='block';d.innerHTML='<b>خطأ في التحميل</b><br><br>'+m+'<br><br><span style="color:#999;font-size:12px">السطر: '+l+'<br>الملف: '+s+'</span>'}};
</script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script>
"use strict";
// ═══════════════════════════════════════════════════════════════
// بدون Babel — React.createElement مباشرة لضمان عدم أخطاء تحويل
// ═══════════════════════════════════════════════════════════════
var h = React.createElement;
var CUR = "ج.م";

// بيانات
var TIERS = [

var PE = {
  resolve: function(pid,unit,tn){
    var tbl = unit==="carton"?PCT:PPK;
    var row = tbl[pid];
    return row?(row[tn]||row.base):0;
  },
  calc: function(it,tier){
    if(it.ps==="flash"||it.ps==="daily") return it.fp;
    var p = null;
    for(var i=0;i<PRODS.length;i++){if(PRODS[i].product_id===it.pid){p=PRODS[i];break}}
    if(!p) return 0;
    var c = CM[p.company_id];
    if(!c) return 0;
    var base = this.resolve(it.pid,it.unit,tier.tier_name);
    var tOk = it.unit==="carton"?tier.discount_carton:tier.discount_pack;
    var cOk = c.allow_discount;
    var pOk = it.unit==="carton"?p.discount_carton:p.discount_pack;
    if(tOk&&cOk&&pOk&&tier.discount_percent>0) return Math.round(base*(1-tier.discount_percent/100)*100)/100;
    return base;
  },
  totals: function(items,tier){
    var pT=0,dT=0,fT=0;
    for(var i=0;i<items.length;i++){
      var pr=this.calc(items[i],tier);
      var s=pr*items[i].qty;
      if(items[i].ps==="flash")fT+=s;
      else if(items[i].ps==="daily")dT+=s;
      else pT+=s;
    }
    return {
      productsTotal:Math.round(pT*100)/100,
      dealsTotal:Math.round(dT*100)/100,
      flashTotal:Math.round(fT*100)/100,
