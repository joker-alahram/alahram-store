<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأهرام للتجارة والتوزيع</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {font-family:'Cairo';margin:0;background:#eef2f7;padding-bottom:110px}

/* HEADER */
header {
background:linear-gradient(135deg,#0b3d91,#1565c0);
color:#fff;
text-align:center;
}
.banner {width:100%;height:150px;object-fit:cover}

/* TICKERS */
.ticker {background:#0b3d91;color:#fff;overflow:hidden;white-space:nowrap}
.ticker span {
display:inline-block;
padding:10px;
animation:scrollRTL 15s linear infinite;
cursor:pointer;
}
@keyframes scrollRTL {
from{transform:translateX(-100%)}
to{transform:translateX(100%)}
}

/* ALERT BAR */
.tier-alert {
background:#ffeb3b;
padding:8px;
text-align:center;
font-weight:bold;
}

/* BACK BUTTON */
.back-inline {
display:inline-block;
background:#e53935;
color:#fff;
padding:8px 14px;
border-radius:8px;
margin:10px;
cursor:pointer;
}

/* GRID */
.grid {
display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:12px;
padding:10px;
}

/* BRAND */
.card.brand {
background:#fff;
border-radius:20px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
cursor:pointer;
text-align:center;
}
.brand-logo {height:100px;display:flex;align-items:center;justify-content:center}
.brand-logo img {width:80%;height:80%;object-fit:contain}
.brand-name {padding:8px;font-weight:bold}

/* PRODUCT */
.card {background:#fff;padding:10px;border-radius:10px;text-align:center}
.card img {width:100%;height:100px;object-fit:contain}

.unit-select {
background:#e3f2fd;
border:2px solid #0b3d91;
font-weight:bold;
font-size:15px;
}

.qty-input {
background:#fff3e0;
border:2px solid #ff9800;
font-weight:bold;
font-size:15px;
}

/* BUTTON */
button {
background:#25d366;
color:#fff;
border:none;
padding:10px;
border-radius:8px;
margin:5px;
cursor:pointer;
}

.bottom-bar {
position:fixed;
bottom:0;
width:100%;
background:#fff;
padding:10px;
display:flex;
justify-content:space-between;
border-top:1px solid #ddd;
}
</style>
</head>

<body>

<header>
<img id="companyImage" class="banner">
<h2>الأهرام للتجارة والتوزيع</h2>
</header>

<div class="ticker"><span id="newsText"></span></div>
<div class="ticker"><span onclick="showOffers()">🔥 عروض مميزة</span></div>

<div id="tierAlert"></div>

<div id="tiers"></div>

<div id="app"></div>

<div class="bottom-bar">
<div id="total">0 جنيه</div>
<button onclick="goReview()">مراجعة الطلب</button>
</div>

<script>
let data=[],cart={},locationLink="",selectedTier=null;

// تحميل
fetch("https://sheetdb.io/api/v1/x342u61qs0xyu")
.then(res=>res.json())
.then(res=>{
data=res;

// صورة الشركة
let img=data.find(p=>p.company_image)?.company_image;
if(img) document.getElementById("companyImage").src=img;

// خبر
let news=data.find(p=>p.news)?.news;
if(news) document.getElementById("newsText").innerText=news;

// تحميل الشريحة
selectedTier=JSON.parse(localStorage.getItem("tier"));
renderTiers();
updateTierAlert();

showBrands();
});

// عرض الشرائح
function renderTiers(){
let container=document.getElementById("tiers");
container.innerHTML="";

let tiers=data.filter(p=>p.tier_name);

tiers.forEach(t=>{
let btn=document.createElement("button");
btn.innerText=t.tier_name;
btn.onclick=()=>{
selectedTier={
name:t.tier_name,
min:parseFloat(t.tier_min),
discount:parseFloat(t.tier_discount)
};
localStorage.setItem("tier",JSON.stringify(selectedTier));
updateTierAlert();
};
container.appendChild(btn);
});

// زر حذف
let clear=document.createElement("button");
clear.innerText="إلغاء الشريحة";
clear.onclick=()=>{
selectedTier=null;
localStorage.removeItem("tier");
updateTierAlert();
};
container.appendChild(clear);
}

// تنبيه
function updateTierAlert(){
let el=document.getElementById("tierAlert");
if(selectedTier){
el.innerHTML=`<div class="tier-alert">أنت على ${selectedTier.name} - الحد الأدنى ${selectedTier.min}</div>`;
}else el.innerHTML="";
}

// عروض
function showOffers(){
if(selectedTier) return alert("لا يمكن استخدام العروض مع الشريحة");

let offers=data.filter(p=>p.company==="عروض");
renderProducts(offers,true);
}

// الرئيسية
function showBrands(){
const app=document.getElementById("app");
app.innerHTML="";
let brands=[...new Set(data.map(p=>p.company))];

let grid=document.createElement("div");
grid.className="grid";

brands.forEach(b=>{
if(b==="عروض") return;

let logo=data.find(p=>p.company===b)?.brand_image;

let card=document.createElement("div");
card.className="card brand";
card.innerHTML=`
<div class="brand-logo"><img src="${logo}"></div>
<div class="brand-name">${b}</div>
`;
card.onclick=()=>showProducts(b);

grid.appendChild(card);
});

app.appendChild(grid);
}

// منتجات
function showProducts(company){
const app=document.getElementById("app");
app.innerHTML=`<div class="back-inline" onclick="showBrands()">⬅ اضغط للرجوع</div>`;
let list=data.filter(p=>p.company===company);
renderProducts(list,true);
}

// عرض
function renderProducts(list,clear=false){
const app=document.getElementById("app");
if(clear) app.innerHTML+= "";

let grid=document.createElement("div");
grid.className="grid";

list.forEach(p=>{
let status=(p.status||"").trim();
let disabled=status==="0";

let carton=parseFloat(p.price_carton);
let unit=parseFloat(p.price_unit);
let piece=parseFloat(p.price_piece);

let options="";
if(!isNaN(carton)) options+=`<option data-price="${carton}">كرتونة</option>`;
if(!isNaN(unit)) options+=`<option data-price="${unit}">دستة</option>`;
if(!isNaN(piece)) options+=`<option data-price="${piece}">قطعة</option>`;

let note=disabled?"<div style='color:red'>نفذت الكمية ستصل قريبا</div>":"";

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${p.image}">
<h4>${p.name}</h4>
${note}
<select class="unit-select" ${disabled?"disabled":""}
onchange="setUnit('${p.name}',this)">
<option disabled selected>اختر الوحدة</option>
${options}
</select>

<input class="qty-input" type="number" ${disabled?"disabled":""}
placeholder="ادخل الكمية"
onchange="setQty('${p.name}',this.value)">
`;

grid.appendChild(card);
});

app.appendChild(grid);
}

// سلة
function setUnit(name,el){
let price=el.options[el.selectedIndex].getAttribute("data-price");
if(!cart[name]) cart[name]={};
cart[name].price=parseFloat(price);
cart[name].unit=el.value;
}

function setQty(name,qty){
qty=parseInt(qty);
if(qty>0){
if(!cart[name]) cart[name]={};
cart[name].qty=qty;
}else delete cart[name];
updateTotal();
}

// إجمالي
function updateTotal(){
let total=0;
for(let i in cart){
let p=cart[i];
if(p.price && p.qty) total+=p.price*p.qty;
}
document.getElementById("total").innerText=total+" جنيه";
}

// مراجعة
function goReview(){
const app=document.getElementById("app");

let total=0;
let html=`<div class="back-inline" onclick="showBrands()">⬅ اضغط للرجوع</div>`;

for(let item in cart){
let p=cart[item];
total+=p.price*p.qty;

html+=`
<div style="background:#fff;padding:10px;margin:10px">
<h4>${item}</h4>
<button onclick="changeQty('${item}',1)">+</button>
<button onclick="changeQty('${item}',-1)">-</button>
<button onclick="removeItem('${item}')">حذف</button>
<p>${p.qty}</p>
</div>`;
}

// خصم
let final=total;
let discountValue=0;

if(selectedTier && total>=selectedTier.min){
discountValue=(total*selectedTier.discount)/100;
final=total-discountValue;
}

html+=`
<h3>الإجمالي: ${total}</h3>
${discountValue?`<h3>الخصم: ${discountValue}</h3><h3>الصافي: ${final}</h3>`:""}

<input id="name" placeholder="اسم العميل">
<input id="phone" placeholder="رقم الموبايل">
<input id="business" placeholder="النشاط">
<textarea id="address" placeholder="العنوان"></textarea>

<button onclick="getLocation()">📍 تحديد الموقع</button>
<p id="locStatus"></p>

<button onclick="sendOrder()">إرسال الطلب</button>
`;

app.innerHTML=html;
}

// تعديل
function changeQty(name,c){
cart[name].qty+=c;
if(cart[name].qty<=0) delete cart[name];
goReview();
updateTotal();
}

function removeItem(name){
delete cart[name];
goReview();
updateTotal();
}

// لوكيشن
function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
locationLink=`https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
document.getElementById("locStatus").innerText="تم تحديد الموقع";
});
}

// إرسال
function sendOrder(){

let name=document.getElementById("name");
let phone=document.getElementById("phone");
let business=document.getElementById("business");
let address=document.getElementById("address");

let fields=[name,phone,business,address];
let valid=true;

fields.forEach(f=>{
if(!f.value){
f.style.border="2px solid red";
valid=false;
}else f.style.border="";
});

if(!valid){
alert("فضلا ادخل البيانات كاملة");
return;
}

let total=0;
let msg="طلب جديد:%0A";

for(let item in cart){
let p=cart[item];
let code=data.find(x=>x.name===item)?.code||"";
total+=p.price*p.qty;
msg+=`${code} ${item} × ${p.qty} ${p.unit} = ${p.price*p.qty}%0A`;
}

msg+=`%0Aالإجمالي: ${total}%0A`;

if(selectedTier){
msg+=`الشريحة: ${selectedTier.name}%0A`;
msg+=`الخصم: ${selectedTier.discount}%0A`;
}

if(locationLink) msg+=`📍 ${locationLink}`;

window.open(`https://wa.me/201552670465?text=${msg}`);
}
</script>

</body>
</html>
