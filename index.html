<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأهرام للتجارة والتوزيع</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {font-family:'Cairo';margin:0;background:#eef2f7;padding-bottom:120px}

/* الهيدر */
header {background:linear-gradient(135deg,#0b3d91,#1565c0);color:#fff;text-align:center}
.banner {width:100%;height:150px;object-fit:cover}

/* الشريط */
.ticker {background:#0b3d91;color:#fff;overflow:hidden;white-space:nowrap}
.ticker span {display:inline-block;padding:10px;animation:scrollRTL 15s linear infinite}
@keyframes scrollRTL {from{transform:translateX(-100%)}to{transform:translateX(100%)}}

/* الشريحة */
.tier-banner {background:#ffeb3b;padding:8px;text-align:center;font-weight:bold}

/* أزرار */
.tier-buttons {display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:10px}
.tier-buttons button {background:#0b3d91;color:#fff;border:none;padding:8px 12px;border-radius:8px}
.clear-tier {background:#e53935}
.offer-btn {background:#ff9800}

/* رجوع */
.back-inline {display:inline-block;background:#e53935;color:#fff;padding:8px 14px;border-radius:8px;margin:10px}

/* الشبكة */
.grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:10px}

/* الكروت */
.card {background:#fff;padding:10px;border-radius:12px;text-align:center}
.card img {width:100%;height:100px;object-fit:contain}

/* الوحدة */
select {
width:95%;
padding:10px;
background:#e3f2fd;
border:2px solid #0b3d91;
font-size:15px;
font-weight:bold;
border-radius:8px;
}

/* الكمية */
input[type=number] {
width:95%;
padding:10px;
background:#fff3e0;
border:2px solid #ff9800;
font-size:15px;
font-weight:bold;
border-radius:8px;
}

/* المراجعة */
.review-box {
background:#fff;
margin:10px;
padding:12px;
border-radius:10px;
}

/* تظليل خطأ */
.error {
border:2px solid red !important;
}

/* أسفل */
.bottom-bar {
position:fixed;
bottom:0;
width:100%;
background:#fff;
padding:10px;
display:flex;
justify-content:space-between;
border-top:1px solid #ddd;
}

.footer {
text-align:center;
font-size:12px;
margin:10px;
}
</style>
</head>

<body>

<header>
<img id="companyImage" class="banner">
<h2>الأهرام للتجارة والتوزيع</h2>
</header>

<div class="ticker"><span id="newsText"></span></div>
<div id="tierBanner"></div>
<div class="tier-buttons" id="tiers"></div>

<input placeholder="🔍 بحث..." oninput="globalSearch(this.value)" style="width:90%;margin:10px">

<div id="app"></div>

<div class="footer">تم التصميم بواسطة YaSsEr EL Joker</div>

<div class="bottom-bar">
<div id="total">0 جنيه</div>
<button onclick="goReview()">مراجعة الطلب</button>
</div>

<script>
let data=[],cart={},tier=null,locationLink="";

// تحميل
fetch("https://sheetdb.io/api/v1/x342u61qs0xyu")
.then(r=>r.json())
.then(res=>{
data=res;

// استرجاع
cart=JSON.parse(localStorage.getItem("cart")||"{}");
tier=JSON.parse(localStorage.getItem("tier")||"null");

updateTotal();
updateTierBanner();

// صورة
let img=data.find(p=>p.company_image)?.company_image;
if(img) document.getElementById("companyImage").src=img;

// خبر
let news=data.find(p=>p.news)?.news;
if(news) document.getElementById("newsText").innerText=news;

loadTiers();
showBrands();
});

// حفظ
function saveAll(){
localStorage.setItem("cart",JSON.stringify(cart));
localStorage.setItem("tier",JSON.stringify(tier));
}

// الشرائح
function loadTiers(){
let tiers=data.filter(p=>p.tier_name);
let c=document.getElementById("tiers");c.innerHTML="";

tiers.forEach(t=>{
let b=document.createElement("button");
b.innerText=t.tier_name;
b.onclick=()=>selectTier(t);
c.appendChild(b);
});

let offer=document.createElement("button");
offer.innerText="صفقة اليوم";
offer.className="offer-btn";
offer.onclick=openOffers;
c.appendChild(offer);

let clear=document.createElement("button");
clear.innerText="إلغاء الشريحة";
clear.className="clear-tier";
clear.onclick=clearTier;
c.appendChild(clear);
}

function selectTier(t){
tier=t;
for(let i in cart){ if(cart[i].isOffer) delete cart[i]; }
saveAll();
updateTierBanner();
}

function clearTier(){
tier=null;
saveAll();
updateTierBanner();
}

function updateTierBanner(){
let el=document.getElementById("tierBanner");
if(tier){
el.innerHTML=`أنت على ${tier.tier_name} - الحد الأدنى ${tier.tier_min}`;
el.className="tier-banner";
}else el.innerHTML="";
}

// براندات
function showBrands(){
let app=document.getElementById("app");app.innerHTML="";
let brands=[...new Set(data.map(p=>p.company))];

let g=document.createElement("div");g.className="grid";

brands.forEach(b=>{
let logo=data.find(p=>p.company===b)?.brand_image;
let card=document.createElement("div");
card.className="card";
card.innerHTML=`<img src="${logo}"><h4>${b}</h4>`;
card.onclick=()=>showProducts(b);
g.appendChild(card);
});

app.appendChild(g);
}

// منتجات
function showProducts(c){
let app=document.getElementById("app");
app.innerHTML=`<div class="back-inline" onclick="showBrands()">⬅ رجوع</div><h3>${c}</h3>`;
renderProducts(data.filter(p=>p.company===c));
}

// عروض
function openOffers(){
if(tier){alert("الغِ الشريحة أولاً");return;}
showProducts("عروض");
}

// بحث
function globalSearch(q){
if(!q){showBrands();return;}
let res=data.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()));
let app=document.getElementById("app");
app.innerHTML=`<div class="back-inline" onclick="showBrands()">⬅ رجوع</div>`;
renderProducts(res);
}

// عرض
function renderProducts(list){
let app=document.getElementById("app");
let g=document.createElement("div");g.className="grid";

list.forEach(p=>{
let options="";
if(p.price_carton) options+=`<option data-price="${p.price_carton}">كرتونة</option>`;
if(p.price_unit) options+=`<option data-price="${p.price_unit}">دستة</option>`;
if(p.price_piece) options+=`<option data-price="${p.price_piece}">قطعة</option>`;

let status=p.status=="0"?"نفذت الكمية ستصل قريبا":"";

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${p.image}">
<h4>${p.name}</h4>
<div style="color:red">${status}</div>

<select onchange="setUnit('${p.name}',this)">
<option disabled selected>اختر الوحدة</option>
${options}
</select>

<input type="number" placeholder="ادخل الكمية"
onchange="setQty('${p.name}',this.value)">
`;

g.appendChild(card);
});

app.appendChild(g);
}

// سلة
function setUnit(n,e){
let price=e.options[e.selectedIndex].getAttribute("data-price");
if(!cart[n]) cart[n]={};
cart[n].price=parseFloat(price);
cart[n].unit=e.value;
updateTotal();saveAll();
}

function setQty(n,q){
q=parseInt(q);
if(q>0){
if(!cart[n]) cart[n]={};
cart[n].qty=q;
}else delete cart[n];

updateTotal();saveAll();
}

// إجمالي
function updateTotal(){
let t=0;
for(let i in cart){let p=cart[i];if(p.price&&p.qty)t+=p.price*p.qty;}
document.getElementById("total").innerText=t+" جنيه";
}

// مراجعة
function goReview(){
let app=document.getElementById("app");
let total=0,html=`<div class="back-inline" onclick="showBrands()">⬅ رجوع</div><h3>مراجعة الطلب</h3>`;

for(let i in cart){
let p=cart[i];total+=p.price*p.qty;
html+=`<div class="review-box">${i} × ${p.qty} (${p.unit}) = ${p.price*p.qty}</div>`;
}

let discount=0;
if(tier && total>=tier.tier_min){
discount=total*(tier.tier_discount/100);
}
let net=total-discount;

html+=`
<h3>الإجمالي: ${total}</h3>
<h3>الخصم: ${discount}</h3>
<h3>الصافي: ${net}</h3>

<input id="name" placeholder="الاسم">
<input id="phone" placeholder="الموبايل">
<textarea id="address" placeholder="العنوان"></textarea>

<button onclick="getLocation()">📍 تحديد الموقع</button>
<p id="loc"></p>

<button onclick="sendOrder(${net},${total},${discount})">إرسال</button>
`;

app.innerHTML=html;
}

// موقع
function getLocation(){
navigator.geolocation.getCurrentPosition(p=>{
locationLink=`https://maps.google.com/?q=${p.coords.latitude},${p.coords.longitude}`;
document.getElementById("loc").innerText="تم تحديد الموقع";
});
}

// إرسال
function sendOrder(net,total,discount){

let n=document.getElementById("name");
let p=document.getElementById("phone");
let a=document.getElementById("address");

[n,p,a].forEach(f=>f.classList.remove("error"));

if(!n.value||!p.value||!a.value){
if(!n.value)n.classList.add("error");
if(!p.value)p.classList.add("error");
if(!a.value)a.classList.add("error");
alert("فضلا ادخل البيانات كامله");
return;
}

if(tier && total<tier.tier_min){
alert("لم تحقق شرط الشريحة");
return;
}

let msg="طلب:%0A";

for(let i in cart){
let pr=cart[i];
msg+=`${i} × ${pr.qty} (${pr.unit}) = ${pr.price*pr.qty}%0A`;
}

msg+=`%0Aالإجمالي: ${total}`;
msg+=`%0Aالخصم: ${discount}`;
msg+=`%0Aالصافي: ${net}`;

if(tier){
msg+=`%0Aالشريحة: ${tier.tier_name}`;
}

if(locationLink){
msg+=`%0Aالموقع: ${locationLink}`;
}

window.open(`https://wa.me/201552670465?text=${msg}`);
}
</script>

</body>
</html>
