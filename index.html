<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأهرام للتجارة والتوزيع</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{font-family:'Cairo';margin:0;background:#F5F7FA}

/* ===== HEADER ===== */
.header{
position:relative;
height:180px;
overflow:hidden;
}
.header img{
width:100%;
height:100%;
object-fit:cover;
}
.overlay{
position:absolute;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.35);
}
.title{
position:absolute;
top:15px;
right:15px;
color:#fff;
font-size:18px;
font-weight:bold;
background:rgba(0,0,0,0.4);
padding:6px 12px;
border-radius:8px;
}

/* ===== TICKER ===== */
.ticker{
background:#E53935;
color:#fff;
padding:8px;
overflow:hidden;
white-space:nowrap;
}
.ticker span{
display:inline-block;
animation:scroll 15s linear infinite;
}
@keyframes scroll{
from{transform:translateX(-100%)}
to{transform:translateX(100%)}
}

/* ===== TIER ===== */
.tier-banner{
background:#FFD600;
text-align:center;
padding:8px;
font-weight:bold;
}

.tiers{
display:flex;
flex-wrap:wrap;
gap:6px;
padding:10px;
}
.tiers button{
flex:1 1 30%;
border:none;
padding:8px;
border-radius:20px;
color:#fff;
cursor:pointer;
}
.t1{background:#64B5F6}
.t2{background:#42A5F5}
.t3{background:#1E88E5}
.t4{background:#1565C0}
.t5{background:#0D47A1}
.t6{background:#002171}

.offer-btn{
background:#E53935!important;
}
.clear-btn{
background:#000!important;
}

/* ===== SEARCH ===== */
.search{
width:90%;
margin:10px auto;
display:block;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

/* ===== GRID ===== */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

/* ===== CARD ===== */
.card{
background:#fff;
padding:10px;
border-radius:12px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
.card img{
width:100%;
height:100px;
object-fit:contain;
}
.price-old{
text-decoration:line-through;
color:#999;
font-size:13px;
}
.price-new{
color:#E53935;
font-weight:bold;
}

select,input{
width:100%;
padding:6px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
}

input{font-size:13px}

/* ===== BACK ===== */
.back{
background:#E53935;
color:#fff;
padding:8px;
margin:10px;
border-radius:8px;
text-align:center;
}

/* ===== BOTTOM ===== */
.bottom{
position:fixed;
bottom:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-top:1px solid #ccc;
}

.review-btn{
background:#0B3D91;
color:#fff;
padding:10px 15px;
border:none;
border-radius:20px;
font-size:14px;
}

.dark-btn{
background:#000;
color:#fff;
padding:8px;
border-radius:50%;
}

/* ===== REVIEW ===== */
.review-card{
background:#fff;
padding:10px;
margin:10px;
border-radius:10px;
}

.input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:1px solid #ccc;
}

.send-btn{
background:#0B3D91;
color:#fff;
padding:12px;
width:80%;
margin:20px auto;
display:block;
border:none;
border-radius:20px;
font-size:16px;
}

</style>
</head>

<body>

<div class="header">
<img id="img">
<div class="overlay"></div>
<div class="title">الأهرام للتجارة والتوزيع</div>
</div>

<div class="ticker"><span id="news"></span></div>

<div id="tierBanner"></div>
<div class="tiers" id="tiers"></div>

<input class="search" placeholder="بحث..." oninput="search(this.value)">

<div id="app"></div>

<div style="text-align:center;font-size:12px;margin-bottom:80px">
تم التصميم بواسطة YaSsEr EL Joker
</div>

<div class="bottom">
<button class="dark-btn" onclick="toggleDark()">🌙</button>
<div id="total">0</div>
<button class="review-btn" onclick="review()">🧾 مراجعة</button>
</div>

<script>
let data=[],cart={},tier=null,lastView="brands",searchText="";

fetch("https://sheetdb.io/api/v1/x342u61qs0xyu")
.then(r=>r.json())
.then(res=>{
data=res;

cart=JSON.parse(localStorage.getItem("cart")||"{}");
tier=JSON.parse(localStorage.getItem("tier")||"null");

updateTotal();
loadUI();
});

/* ===== UI ===== */
function loadUI(){
document.getElementById("img").src=data[0].company_image||"";
document.getElementById("news").innerText=data[0].news||"";

loadTiers();
showBrands();
}

/* ===== TIERS ===== */
function loadTiers(){
let t=data.filter(x=>x.tier_name && x.tier_active!="0");
let c=document.getElementById("tiers");
c.innerHTML="";

t.forEach((e,i)=>{
let b=document.createElement("button");
b.className="t"+(i+1);
b.innerText=e.tier_name;
b.onclick=()=>selectTier(e);
c.appendChild(b);
});

let offer=document.createElement("button");
offer.innerText="🔥 صفقة اليوم";
offer.className="offer-btn";
offer.onclick=openOffers;
c.appendChild(offer);

let clear=document.createElement("button");
clear.innerText="إلغاء";
clear.className="clear-btn";
clear.onclick=clearTier;
c.appendChild(clear);
}

function selectTier(t){
if(!tier) cart={}; // اول مرة فقط
tier=t;
localStorage.setItem("tier",JSON.stringify(t));
updateTierBanner();
renderCurrent();
}

function clearTier(){
tier=null;
cart={};
localStorage.removeItem("tier");
updateTierBanner();
renderCurrent();
}

function updateTierBanner(){
let el=document.getElementById("tierBanner");
if(tier){
el.innerHTML=`أنت على ${tier.tier_name} - خصم ${tier.tier_discount}%`;
el.className="tier-banner";
}else el.innerHTML="";
}

/* ===== BRANDS ===== */
function showBrands(){
lastView="brands";
let app=document.getElementById("app");
app.innerHTML="";
let brands=[...new Set(data.map(p=>p.company))]
.filter(b=>!(tier && b=="صفقه اليوم"));

let grid=document.createElement("div");
grid.className="grid";

brands.forEach(b=>{
let logo=data.find(p=>p.company==b)?.brand_image;
let c=document.createElement("div");
c.className="card";
c.innerHTML=`<img src="${logo}"><h4>${b}</h4>`;
c.onclick=()=>showProducts(b);
grid.appendChild(c);
});
app.appendChild(grid);
}

/* ===== PRODUCTS ===== */
function showProducts(company){
lastView={type:"brand",value:company};
let app=document.getElementById("app");
app.innerHTML=`<div class="back" onclick="goBack()">⬅ اضغط للرجوع</div>`;
renderProducts(data.filter(p=>p.company==company));
}

function openOffers(){
if(tier)return alert("غير متاح مع الشريحة");
showProducts("صفقه اليوم");
}

/* ===== SEARCH ===== */
function search(q){
searchText=q;
if(!q)return showBrands();

let list=data.filter(p=>
p.name.toLowerCase().includes(q.toLowerCase()) &&
!(tier && p.company=="صفقه اليوم")
);

lastView={type:"search",value:q};

let app=document.getElementById("app");
app.innerHTML=`<div class="back" onclick="goBack()">⬅ رجوع</div>`;
renderProducts(list);
}

/* ===== PRODUCTS RENDER ===== */
function renderProducts(list){
let app=document.getElementById("app");
let grid=document.createElement("div");
grid.className="grid";

list.forEach(p=>{
let price=parseFloat(p.price_carton)||0;
let discount=tier?price*(tier.tier_discount/100):0;
let final=price-discount;

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${p.image}">
<h4>${p.name}</h4>
<div class="price-old">${price}</div>
<div class="price-new">${final}</div>

<select onchange="setUnit('${p.name}',this)">
<option disabled selected>اختر الوحدة</option>
<option value="كرتونة">كرتونة</option>
</select>

<input type="number" placeholder="ادخل الكمية" disabled
onfocus="checkUnit('${p.name}')"
oninput="setQty('${p.name}',this.value)">
`;

grid.appendChild(card);
});

app.appendChild(grid);
}

/* ===== CART ===== */
function setUnit(name,el){
if(!cart[name]) cart[name]={};
cart[name].unit=el.value;
el.nextElementSibling.disabled=false;
}

function checkUnit(name){
if(!cart[name] || !cart[name].unit){
alert("فضلاً اختر وحدة الشراء أولاً");
}
}

function setQty(name,qty){
if(!cart[name] || !cart[name].unit)return;

let price=parseFloat(data.find(p=>p.name==name).price_carton)||0;
let discount=tier?price*(tier.tier_discount/100):0;
let final=price-discount;

cart[name]={...cart[name],qty,price:final};

save();
updateTotal();
}

function save(){
localStorage.setItem("cart",JSON.stringify(cart));
}

/* ===== TOTAL ===== */
function updateTotal(){
let t=0;
for(let i in cart){
t+=cart[i].price*cart[i].qty;
}
document.getElementById("total").innerText=t+" جنيه";
}

/* ===== REVIEW ===== */
function review(){
lastViewBeforeReview=lastView;
let app=document.getElementById("app");
let html=`<div class="back" onclick="goBack()">⬅ رجوع</div><h3>مراجعة الطلب</h3>`;

for(let i in cart){
let p=cart[i];
html+=`
<div class="review-card">
<h4>${i}</h4>
<button onclick="change('${i}',1)">+</button>
<button onclick="change('${i}',-1)">-</button>
<button onclick="del('${i}')">حذف</button>
</div>`;
}

html+=`
<input class="input" id="name" placeholder="الاسم">
<input class="input" id="phone" placeholder="التليفون">
<input class="input" id="activity" placeholder="النشاط">
<textarea class="input" id="address" placeholder="العنوان"></textarea>

<button class="send-btn" onclick="send()">إرسال</button>
`;

app.innerHTML=html;
}

/* ===== EDIT ===== */
function change(name,v){
cart[name].qty+=v;
if(cart[name].qty<=0) delete cart[name];
save();review();updateTotal();
}
function del(name){
delete cart[name];
save();review();updateTotal();
}

/* ===== SEND ===== */
function send(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;

if(!name||!phone)return alert("ادخل البيانات");

let msg="طلب:%0A";

for(let i in cart){
let p=cart[i];
msg+=`${i} × ${p.qty} = ${p.price*p.qty}%0A`;
}

window.open("https://wa.me/201552670465?text="+msg);
}

/* ===== BACK ===== */
function goBack(){
if(lastView.type=="brand") showProducts(lastView.value);
else if(lastView.type=="search") search(lastView.value);
else showBrands();
}

/* ===== DARK ===== */
function toggleDark(){
document.body.classList.toggle("dark");
}
</script>

</body>
</html>
