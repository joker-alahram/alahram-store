<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأهرام للتجارة والتوزيع</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {font-family:'Cairo'; margin:0; background:#eef2f7; padding-bottom:100px}

header {
  background:#0b3d91;
  color:#fff;
  padding:15px;
  text-align:center;
}

.contact a {
  color:#fff;
  text-decoration:none;
  background:rgba(255,255,255,0.2);
  padding:6px 10px;
  border-radius:6px;
  margin:5px;
  display:inline-block;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:10px;
  padding:10px;
}

.card {
  background:#fff;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.card img {
  width:100%;
  height:100px;
  object-fit:contain;
}

.price-carton {
  color:#0b3d91;
  font-weight:bold;
  font-size:13px;
}

.search {
  width:90%;
  margin:10px auto;
  padding:8px;
  display:block;
}

button {
  background:#25d366;
  color:#fff;
  border:none;
  padding:8px;
  border-radius:8px;
  margin:5px;
}

.back {background:#333}

.bottom-bar {
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  padding:10px;
  display:flex;
  justify-content:space-between;
  border-top:1px solid #ddd;
}

.review-item {
  background:#fff;
  padding:10px;
  margin:10px;
  border-radius:10px;
}
</style>

</head>
<body>

<header>
<h2>الأهرام للتجارة والتوزيع</h2>
<p>توريد مستحضرات التجميل والعناية الشخصية</p>

<div class="contact">
  <a href="tel:01040880002">📞 مبيعات</a>
  <a href="https://wa.me/201552670465">💬 واتساب</a>
</div>
</header>

<div id="app"></div>

<div class="bottom-bar">
  <div id="total">0 جنيه</div>
  <button onclick="goReview()">مراجعة الطلب</button>
</div>

<script>
let data = [];
let cart = {};
let currentProducts = [];
let sortAsc = true;

fetch("https://sheetdb.io/api/v1/x342u61qs0xyu")
.then(res => res.json())
.then(res => {
  data = res;
  showBrands();
});

// ====== الشركات ======
function showBrands(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  let brands = [...new Set(data.map(p => p.company))];

  let grid = document.createElement("div");
  grid.className = "grid";

  brands.forEach(b => {
    let brandLogo = data.find(p => p.company === b)?.brand_image;

    let card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${brandLogo || 'https://via.placeholder.com/150'}">
      <h3>${b}</h3>
    `;

    card.onclick = () => showProducts(b);
    grid.appendChild(card);
  });

  app.appendChild(grid);
}

// ====== المنتجات ======
function showProducts(company){
  const app = document.getElementById("app");
  app.innerHTML = "";

  currentProducts = data.filter(p => p.company === company);

  let back = document.createElement("button");
  back.innerText = "⬅ رجوع";
  back.className = "back";
  back.onclick = showBrands;
  app.appendChild(back);

  let search = document.createElement("input");
  search.className = "search";
  search.placeholder = "🔍 ابحث (مثال: ريد 400)";
  search.oninput = () => renderProducts(search.value);
  app.appendChild(search);

  let sortBtn = document.createElement("button");
  sortBtn.innerText = "💰 الأقل للأعلى";

  sortBtn.onclick = () => {
    if(sortAsc){
      currentProducts.sort((a,b)=>a.price_carton-b.price_carton);
      sortBtn.innerText = "🔄 الأعلى للأقل";
    } else {
      currentProducts.sort((a,b)=>b.price_carton-a.price_carton);
      sortBtn.innerText = "💰 الأقل للأعلى";
    }
    sortAsc = !sortAsc;
    renderProducts("");
  };

  app.appendChild(sortBtn);

  let container = document.createElement("div");
  container.id = "products";
  app.appendChild(container);

  renderProducts("");
}

// ====== البحث الذكي ======
function smartSearch(products, filter){
  let words = filter.toLowerCase().split(" ").filter(w => w);

  return products.filter(p => {
    let name = p.name.toLowerCase();

    return words.every(word => name.includes(word));
  });
}

// ====== رسم المنتجات ======
function renderProducts(filter){
  let container = document.getElementById("products");
  container.innerHTML = "";

  let list = filter ? smartSearch(currentProducts, filter) : currentProducts;

  let grid = document.createElement("div");
  grid.className = "grid";

  list.forEach(p => {

    let options = "";
    if(p.price_carton) options += `<option data-price="${p.price_carton}">كرتونة</option>`;
    if(p.price_unit) options += `<option data-price="${p.price_unit}">دستة</option>`;
    if(p.price_piece) options += `<option data-price="${p.price_piece}">قطعة</option>`;

    let card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${p.image || 'https://via.placeholder.com/150'}">
      <h4>${p.name}</h4>
      <div class="price-carton">سعر الكرتونة: ${p.price_carton || "-"} جنيه</div>

      <select onchange="setUnit('${p.name}', this)">
        <option>اختر الوحدة</option>
        ${options}
      </select>

      <input type="number" min="0"
        onchange="setQty('${p.name}', this.value)">
    `;

    grid.appendChild(card);
  });

  container.appendChild(grid);
}

// ====== السلة ======
function setUnit(name, el){
  let price = el.options[el.selectedIndex].getAttribute("data-price");

  if(!cart[name]) cart[name] = {};
  cart[name].price = parseFloat(price);
  cart[name].unit = el.value;

  updateTotal();
}

function setQty(name, qty){
  qty = parseInt(qty);

  if(qty > 0){
    if(!cart[name]) cart[name] = {};
    cart[name].qty = qty;
  } else {
    delete cart[name];
  }

  updateTotal();
}

// ====== الإجمالي ======
function updateTotal(){
  let total = 0;

  for(let i in cart){
    let p = cart[i];
    if(p.price && p.qty){
      total += p.price * p.qty;
    }
  }

  document.getElementById("total").innerText = total + " جنيه";
}

// ====== مراجعة الطلب ======
function goReview(){
  const app = document.getElementById("app");
  app.innerHTML = "<h3 style='text-align:center'>مراجعة الطلب</h3>";

  let total = 0;

  for(let item in cart){
    let p = cart[item];
    total += p.price * p.qty;

    app.innerHTML += `
      <div class="review-item">
        <h4>${item}</h4>
        <p>${p.unit}</p>

        <button onclick="changeQty('${item}',1)">➕</button>
        <button onclick="changeQty('${item}',-1)">➖</button>
        <button onclick="removeItem('${item}')">❌ حذف</button>

        <p>الكمية: ${p.qty}</p>
      </div>
    `;
  }

  app.innerHTML += `
    <h3 style="text-align:center">الإجمالي: ${total} جنيه</h3>
    <button onclick="sendOrder()">إرسال الطلب</button>
    <button onclick="showBrands()">رجوع</button>
  `;
}

function changeQty(name, change){
  if(cart[name]){
    cart[name].qty += change;
    if(cart[name].qty <= 0) delete cart[name];
  }
  goReview();
  updateTotal();
}

function removeItem(name){
  delete cart[name];
  goReview();
  updateTotal();
}

// ====== إرسال ======
function sendOrder(){
  let msg = "طلب جديد من موقع الأهرام:%0A%0A";

  for(let item in cart){
    let p = cart[item];
    msg += `📦 ${item}%0A`;
    msg += `الكمية: ${p.qty} (${p.unit})%0A%0A`;
  }

  msg += "📞 سيتم التواصل لتأكيد الطلب";

  window.open(`https://wa.me/201552670465?text=${msg}`);
}
</script>

</body>
</html>
