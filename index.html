<style>

const PE={
  resolve(pid,unit,tn){const r=(unit==='carton'?PCT:PPK)[pid];return r?(r[tn]??r.base):0},
  calc(it,tier){
    if(it.ps==='flash'||it.ps==='daily')return it.fp;
    const p=PRODS.find(x=>x.product_id===it.pid);if(!p)return 0;
    const c=CM[p.company_id];if(!c)return 0;
    const base=this.resolve(it.pid,it.unit,tier.tier_name);
    const tOk=it.unit==='carton'?tier.discount_carton:tier.discount_pack;
    const cOk=c.allow_discount;
    const pOk=it.unit==='carton'?p.discount_carton:p.discount_pack;
    if(tOk&&cOk&&pOk&&tier.discount_percent>0)return Math.round(base*(1-tier.discount_percent/100)*100)/100;
    return base;
  },
  totals(items,tier){
    let pT=0,dT=0,fT=0;
    items.forEach(it=>{const p=this.calc(it,tier);const s=p*it.qty;if(it.ps==='flash')fT+=s;else if(it.ps==='daily')dT+=s;else pT+=s});
    return{productsTotal:Math.round(pT*100)/100,dealsTotal:Math.round(dT*100)/100,flashTotal:Math.round(fT*100)/100,totalAmount:Math.round((pT+dT+fT)*100)/100,tierProgress:Math.round(pT*100)/100};
  }
};
const TE={
  ok:(t,p)=>p>=t.min_order,
  next:(cn,p)=>{const i=TIERS.findIndex(t=>t.tier_name===cn);for(let j=i+1;j<TIERS.length;j++)if(p<TIERS[j].min_order)return TIERS[j];return null}
};
const OE={
  af:a=>(a||[]).filter(f=>f.is_active&&new Date(f.end_time)>new Date()),
  ad:a=>(a||[]).filter(d=>d.is_active&&d.stock>d.sold_count),
  has:a=>this.af(a).length>0
};

  chk:(items,tier,tot)=>{if(!items.length)return{ok:false,msg:'السلة فارغة'};if(!TE.ok(tier,tot.tierProgress))return{ok:false,msg:`الحد الأدنى لشريحة "${tier.visible_label}" هو ${fp(tier.min_order)} ${CUR}`};return{ok:true,msg:''}}

function mkS(init){let st=typeof init==='function'?init():init;const ls=new Set();return{get:()=>st,set:u=>{st=typeof u==='function'?u(st):{...st,...u};ls.forEach(fn=>fn(st))},sub:fn=>{ls.add(fn);return()=>ls.delete(fn)}}}
function useS(store,sel){return React.useSyncExternalStore(store.sub,sel?()=>sel(store.get()):store.get)}

// ═══ Boot ═══
async function boot(){
  sess.set({phase:'booting'});
  try{
    sess.set({phase:'hydrating'});
    const st=localStorage.getItem('b2b_tier');
    if(st&&TIERS.find(t=>t.tier_name===st))cart.set({tn:st});
    const[products,flash,deals]=await Promise.all([Svc.products(),Svc.flash(),Svc.deals()]);
    prS.set({products});ofS.set({flash,deals});
    sess.set({phase:'ready',booted:true});
  }catch(e){console.error(e);sess.set({phase:'error'});}
}

function useCD(end){const cl=()=>{const d=new Date(end).getTime()-Date.now();if(d<=0)return{h:0,m:0,s:0,x:true};return{h:Math.floor(d/36e5),m:Math.floor((d%36e5)/6e4),s:Math.floor((d%6e4)/1e3),x:false}};const[t,setT]=React.useState(cl);React.useEffect(()=>{const i=setInterval(()=>setT(cl()),1000);return()=>clearInterval(i)},[end]);return t}
function useRtr(){const[r,setR]=React.useState(location.hash.slice(1)||'/');React.useEffect(()=>{const h=()=>setR(location.hash.slice(1)||'/');addEventListener('hashchange',h);return()=>removeEventListener('hashchange',h)},[]);const nav=React.useCallback(p=>{if(p===-1)history.back();else location.hash=p},[]);return{route:r,nav}}
function match(r,pat){const rp=r.split('/').filter(Boolean),pp=pat.split('/').filter(Boolean);if(rp.length!==pp.length)return null;const pm={};for(let i=0;i<rp.length;i++){if(pp[i].startsWith(':'))pm[pp[i].slice(1)]=rp[i];else if(pp[i]!==rp[i])return null}return pm}

const ProdCard=({p,tn})=>{const cP=p.has_carton?PE.resolve(p.product_id,'carton',tn):null;const pkP=p.has_pack?PE.resolve(p.product_id,'pack',tn):null;const cmp=CM[p.company_id];const both=cP!==null&&pkP!==null;return<div className="pc"><img className="pc-i" src={img(p.product_id)} alt="" loading="lazy"/><div className="pc-b"><div className="cat">{p.category}</div><h4>{p.product_name}</h4><div className="cmp">{cmp?.company_name||''}</div><div className="pp-tags">{cP!==null&&<span className="pp-t ct">كر {fp(cP)}</span>}{pkP!==null&&<span className="pp-t pk">باك {fp(pkP)}</span>}</div><div className="ti-c"><I n="layers" s={11}/>{TIERS.find(t=>t.tier_name===tn)?.visible_label}</div>{both?<div className="qa-row"><button className="bt bt-p" onClick={()=>addProd(p,'carton')}>+ كرتون</button><button className="bt bt-o" onClick={()=>addProd(p,'pack')}>+ باك</button></div>:<button className="ab" onClick={()=>addProd(p,p.has_carton?'carton':'pack')}><I n="add_shopping_cart" s={14}/> أضف</button>}</div></div>};

const HomePage=()=>{const flash=useS(ofS,s=>s.flash);const deals=useS(ofS,s=>s.deals);const products=useS(prS,s=>s.products);const{tier,tn,totals,next}=useCart();const[cat,setCat]=React.useState('الكل');const loaded=products.length>0;let prods=products;if(cat!=='الكل')prods=prods.filter(p=>p.category===cat);if(!loaded)return<div className="pgrid">{[1,2,3,4,5,6].map(i=><Skel key={i}/>)}</div>;return<div className="pg-in"><DynamicHero flash={flash} tier={tier} totals={totals} next={next}/><FlashStrip flash={flash}/><DealsStrip deals={deals}/><div className="cats-g"><button className={`cat-chip ${cat==='الكل'?'on':''}`} onClick={()=>setCat('الكل')}>الكل</button>{CATS.map(c=><button key={c} className={`cat-chip ${cat===c?'on':''}`} onClick={()=>setCat(c)}>{c}</button>)}</div><div className="sh"><h2>المنتجات</h2><button className="lk" onClick={()=>location.hash='/products'}>عرض الكل <I n="chevron_left" s={14}/></button></div><div className="pgrid">{prods.slice(0,8).map(p=><ProdCard key={p.product_id} p={p} tn={tn}/>)}</div><div className="sh"><h2>الشركات</h2></div><div className="cmp-s">{COMPS.map(c=><div key={c.company_id} className="cmp-c"><div className="ci"><I n="business" s={20}/></div><small>{c.company_name}</small></div>)}</div></div>};

const ProductsPage=()=>{const products=useS(prS,s=>s.products);const tn=useS(cart,s=>s.tn);const[sq,setSq]=React.useState('');const[sc,setSc]=React.useState('الكل');const[lc,setLc]=React.useState('الكل');let prods=products;if(sq.trim()){const q=sq.trim().toLowerCase();prods=prods.filter(p=>p.product_name.toLowerCase().includes(q)||p.product_id.includes(q))}if(sc!=='الكل')prods=prods.filter(p=>p.category===sc);if(lc!=='الكل')prods=prods.filter(p=>CM[p.company_id]?.company_name===lc);return<div className="pg-in"><div className="sbar"><I n="search" s={18} c="si"/><input placeholder="ابحث عن منتج أو كود..." value={sq} onChange={e=>setSq(e.target.value)}/></div><div className="ftabs"><button className={`ftab ${sc==='الكل'?'on':''}`} onClick={()=>setSc('الكل')}>الكل</button>{CATS.map(c=><button key={c} className={`ftab ${sc===c?'on':''}`} onClick={()=>setSc(c)}>{c}</button>)}</div><div className="ftabs" style={{paddingTop:0}}><button className={`ftab ${lc==='الكل'?'on':''}`} onClick={()=>setLc('الكل')}>كل الشركات</button>{COMPS.map(c=><button key={c.company_id} className={`ftab ${lc===c.company_name?'on':''}`} onClick={()=>setLc(c.company_name)}>{c.company_name}</button>)}</div>{!prods.length?<div className="empty"><I n="search_off" s={56}/><h3>لا توجد نتائج</h3></div>:<div className="pgrid">{prods.map(p=><ProdCard key={p.product_id} p={p} tn={tn}/>)}</div>}</div>};

const ProdDetail=({id,nav})=>{const products=useS(prS,s=>s.products);const tn=useS(cart,s=>s.tn);const p=products.find(x=>x.product_id===id);const[u,setU]=React.useState(null);const[q,setQ]=React.useState(1);React.useEffect(()=>{if(p)setU(p.has_carton?'carton':'pack')},[p]);if(!p)return<div className="empty"><I n="broken_image" s={56}/><h3>غير موجود</h3></div>;const cmp=CM[p.company_id];const price=u?PE.resolve(p.product_id,u,tn):0;return<div className="pg-in"><div className="dt-h"><img className="dt-i" src={img(p.product_id)} alt=""/><button className="dt-bk" onClick={()=>nav(-1)}><I n="arrow_forward" s={20}/></button></div><div className="dt-b"><h1>{p.product_name}</h1><div className="dt-m"><span className="bdg-i bdg-p">{p.category}</span>{cmp&&<span className="bdg-i" style={{background:'var(--bg)',color:'var(--tx2)'}}>{cmp.company_name}</span>}</div><div className="dt-inf"><div style={{fontSize:12,fontWeight:700,marginBottom:10}}>اختر الوحدة</div>{p.has_carton&&<div className={`uo ${u==='carton'?'':'o50'}`} onClick={()=>setU('carton')} style={{cursor:'pointer'}}><div className="ul"><span className="un">كرتون</span><span className="uh">96 قطعة</span></div><span className="up">{fp(PE.resolve(p.product_id,'carton',tn))} {CUR}</span></div>}{p.has_pack&&<div className={`uo ${u==='pack'?'':'o50'}`} onClick={()=>setU('pack')} style={{cursor:'pointer'}}><div className="ul"><span className="un">باك</span><span className="uh">12 قطعة</span></div><span className="up">{fp(PE.resolve(p.product_id,'pack',tn))} {CUR}</span></div>}</div><div className="qr"><span className="ql">الكمية</span><QC v={q} onChange={setQ}/></div><div className="tot-row"><span className="tl">الإجمالي</span><span className="tv">{fp(price*q)} {CUR}</span></div><button className="bt bt-p bt-l bt-f" onClick={()=>{addProd(p,u);nav('/cart')}} disabled={!u}><I n="add_shopping_cart" s={18}/> أضف للسلة</button></div></div>};

const FlashPage=()=>{const flash=useS(ofS,s=>s.flash);const af=OE.af(flash);if(!af.length)return<div className="empty"><I n="bolt" s={56}/><h3>لا توجد عروض سريعة</h3></div>;return<div className="pg-in"><div className="sh" style={{paddingTop:14}}><h2>العروض السريعة</h2></div><div style={{padding:'0 14px',display:'flex',flexDirection:'column',gap:10}}>{af.map(o=><div key={o.id} className="cd"><div style={{display:'flex',gap:12,padding:12}}><img src={img('fl'+o.id)} alt="" style={{width:80,height:80,borderRadius:'var(--r)',objectFit:'cover'}}/><div style={{flex:1}}><span className="bdg-i bdg-a" style={{marginBottom:5}}>عرض سريع</span><h4 style={{fontSize:13,fontWeight:700,marginBottom:3,lineHeight:1.35}}>{o.title}</h4><p style={{fontSize:11,color:'var(--tx3)',marginBottom:7}}>{o.description}</p><TB end={o.end_time}/></div></div><div style={{display:'flex',justifyContent:'space-between,align-items:center',padding:'9px 12px',borderTop:'1px solid var(--bd2)',background:'var(--ac-l)'}}><span style={{fontSize:18,fontWeight:900,color:'var(--ac-d)'}}>{fp(o.price)} {CUR}</span><button className="bt bt-a bt-s" onClick={()=>addFlash(o)} disabled={o.stock<=o.sold_count}><I n="bolt" s={14}/> اشتري</button></div></div>)}</div></div>};

const DealsPage=()=>{const deals=useS(ofS,s=>s.deals);if(!deals||!deals.length)return<div className="empty"><I n="local_offer" s={56}/><h3>لا توجد عروض اليوم</h3></div>;return<div className="pg-in"><div className="sh" style={{paddingTop:14}}><h2>عروض اليوم</h2></div><div style={{padding:'0 14px',display:'flex',flexDirection:'column',gap:10}}>{deals.map(d=>{const rem=d.stock-d.sold_count,pct=Math.min(100,(d.sold_count/d.stock)*100);return<div key={d.id} className="cd"><div style={{display:'flex',gap:12,padding:12}}><img src={img('dl'+d.id)} alt="" style={{width:80,height:80,borderRadius:'var(--r)',objectFit:'cover'}}/><div style={{flex:1}}><span className="bdg-i bdg-a" style={{marginBottom:5}}>عرض اليوم</span><h4 style={{fontSize:13,fontWeight:700,marginBottom:3,lineHeight:1.35}}>{d.title}</h4><p style={{fontSize:11,color:'var(--tx3)',marginBottom:4}}>{d.description}</p><div style={{fontSize:10,color:'var(--tx3)',marginBottom:3}}>باقي {rem}</div><div className="dstb"><div className="dstb-f" style={{width:pct+'%'}}></div></div></div></div><div style={{display:'flex',justifyContent:'space-between',alignItems:center',padding:'9px 12px',borderTop:'1px solid var(--bd2)',background:'var(--ac-l)'}}><span style={{fontSize:18,fontWeight:900,color:'var(--ac-d)'}}>{fp(d.price)} {CUR}</span><button className="bt bt-a bt-s" onClick={()=>addDeal(d)} disabled={rem<=0}><I n="add_shopping_cart" s={14}/> أضف</button></div></div>})}</div></div>};

const CartPage=({nav})=>{const{items,tier,tn,totals,count,ok,next}=useCart();const setTn=t=>{cart.set({tn:t});localStorage.setItem('b2b_tier',t)};const chQ=(i,nq)=>{if(nq<1){cart.set(s=>({items:s.items.filter((_,x)=>x!==i)}));toast('تم الحذف','in');return}cart.set(s=>({items:s.items.map((it,x)=>x===i?{...it,qty:nq}:it)}))};const rm=i=>{cart.set(s=>({items:s.items.filter((_,x)=>x!==i)}));toast('تم الحذف','in')};const ck=()=>{const v=VE.chk(items,tier,totals);if(!v.ok){toast(v.msg,'er');return}nav('/checkout')};const gN=it=>{if(it.name)return it.name;const p=PRODS.find(x=>x.product_id===it.pid);return p?p.product_name:it.pid};const gI=it=>it.ps==='flash'?img('fl'+it.pid):it.ps==='daily'?img('dl'+it.pid):img(it.pid);const gU=it=>it.ps==='flash'?'عرض سريع':it.ps==='daily'?'عرض اليوم':it.unit==='carton'?'كرتون':'باك';if(!items.length)return<div className="pg-in"><div className="empty" style={{paddingTop:70}}><I n="shopping_cart" s={56}/><h3>السلة فارغة</h3><p>ابدأ بإضافة منتجات</p><button className="bt bt-p" style={{marginTop:16}} onClick={()=>nav('/products')}>تصفح المنتجات</button></div></div>;const pct=next?Math.min(100,(totals.tierProgress/next.min_order)*100):100;return<div className="pg-in"><div className="tier-sel"><h3><I n="layers"/>اختر الشريحة السعرية</h3><div className="tier-sc">{TIERS.filter(t=>t.is_active).map(t=><div key={t.tier_name} className={`tc ${tn===t.tier_name?'on':''}`} onClick={()=>setTn(t.tier_name)}><div className="tn">{t.visible_label}</div>{t.discount_percent>0&&<div className="td">خصم {t.discount_percent}%</div>}<div className="tm">الحد: {fp(t.min_order)} {CUR}</div>{tn===t.tier_name&&<div className="tck"><I n="check_circle" s={13}/></div>}</div>)}</div></div>{next&&<div className="tier-pb"><div className="lr"><span className="cur">{tier.visible_label}: {fp(totals.tierProgress)} {CUR}</span><span className="tgt">{next.visible_label}: {fp(next.min_order)} {CUR}</span></div><div className="pbar"><div className="pbar-f" style={{width:pct+'%'}}></div></div><div style={{fontSize:9,color:'var(--tx3)',marginTop:4}}>متبقي {fp(Math.max(0,next.min_order-totals.tierProgress))} {CUR}</div></div>}<div className="cd" style={{margin:'0 14px 10px',padding:0}}>{items.map((it,idx)=>{const pr=PE.calc(it,tier);return<div key={it._k+'_'+idx} className="ci-row"><img className="ci-i" src={gI(it)} alt=""/><div className="ci-nfo"><h4>{gN(it)}</h4><div className="ul">{gU(it)}</div><div className="pr">{fp(pr)} {CUR}</div></div><div className="ci-act"><button className="rb" onClick={()=>rm(idx)}><I n="delete_outline" s={16}/></button><div className="qm"><button onClick={()=>chQ(idx,it.qty-1)}>−</button><span>{it.qty}</span><button onClick={()=>chQ(idx,it.qty+1)}>+</button></div></div></div>})}</div><div className="csc"><div className="bkdn"><div className="bkdn-r"><span>إجمالي المنتجات</span><span className="v">{fp(totals.productsTotal)} {CUR}</span></div>{totals.dealsTotal>0&&<div className="bkdn-r"><span>عروض اليوم</span><span className="v">{fp(totals.dealsTotal)} {CUR}</span></div>}{totals.flashTotal>0&&<div className="bkdn-r"><span>عروض سريعة</span><span className="v">{fp(totals.flashTotal)} {CUR}</span></div>}{tier.discount_percent>0&&<div className="bkdn-r" style={{color:'var(--ok)'}}><span>خصم {tier.discount_percent}% — {tier.discount_pack?'كرتونات + باكات':'كرتونات'}</span><span className="v">✓</span></div>}<div className="bkdn-r tot"><span>الإجمالي النهائي</span><span className="v">{fp(totals.totalAmount)} {CUR}</span></div></div></div><div className="note"><I n="info" s={14}/>عروض اليوم والسريعة تُضاف للإجمالي النهائي لكنها لا تُحسب ضمن تأهيل الشرائح السعرية.</div><div className="ckbar"><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}><span style={{fontSize:12,color:'var(--tx2)'}}>{count} عنصر</span><span style={{fontSize:17,fontWeight:900,color:'var(--p)'}}>{fp(totals.totalAmount)} {CUR}</span></div><button className="bt bt-p bt-l bt-f" onClick={ck}>تأكيد الطلب</button></div></div>};

const CheckoutPage=({nav})=>{const{items,tier,totals,ok}=useCart();const[sub,setSub]=React.useState(false);const[done,setDone]=React.useState(null);React.useEffect(()=>{if(!items.length&&!done)nav('/cart')},[items.length,done]);const submit=async()=>{const v=VE.chk(items,tier,totals);if(!v.ok){toast(v.msg,'er');return}setSub(true);try{const r=await Svc.submitOrder({order:{total_amount:totals.totalAmount,products_total:totals.productsTotal,deals_total:totals.dealsTotal,flash_total:totals.flashTotal,status:'confirmed',tier_name:tier.tier_name,customer_type:'direct'},items:items.map(it=>({product_id:it.pid,type:it.ps==='daily'?'deal':it.ps==='flash'?'flash':'product',qty:it.qty,price:PE.calc(it,tier),unit:it.unit}))});setDone(r);cart.set({items:[]});orS.set(s=>({orders:[{order_number:r.order_number,total_amount:totals.totalAmount,products_total:totals.productsTotal,deals_total:totals.dealsTotal,flash_total:totals.flashTotal,workflow_status:'قيد التنفيذ',tier_name:tier.tier_name,created_at:new Date().toISOString(),items_count:items.length},...s.orders]}))}catch(e){toast('خطأ في الإرسال','er')}finally{setSub(false)}};if(done)return<div className="pg-in"><div className="suc"><div className="suc-i"><I n="check" s={36}/></div><h2>تم تأكيد الطلب</h2><p>رقم الطلب</p><div className="onum">{done.order_number}</div><p style={{fontSize:12,color:'var(--tx3)'}}>{fp(totals.totalAmount)} {CUR} — {tier.visible_label}</p><button className="bt bt-p bt-l" style={{marginTop:22}} onClick={()=>nav('/orders')}>عرض طلباتي</button><button className="bt bt-o bt-l" style={{marginTop:8}} onClick={()=>nav('/')}>الرئيسية</button></div></div>;const gN=it=>{if(it.name)return it.name;const p=PRODS.find(x=>x.product_id===it.pid);return p?p.product_name:it.pid};return<div className="pg-in"><div className="sh" style={{paddingTop:14}}><h2>تأكيد الطلب</h2></div><div style={{padding:'0 14px'}}><div className="cd" style={{marginBottom:10,padding:0}}>{items.map((it,idx)=>{const pr=PE.calc(it,tier);return<div key={idx} style={{display:'flex',justifyContent:'space-between',padding:'10px 12px',borderBottom:idx<items.length-1?'1px solid var(--bd2)':'none'}}><div><div style={{fontSize:12,fontWeight:600}}>{gN(it)}</div><div style={{fontSize:10,color:'var(--tx3)'}}>{it.unit==='carton'?'كرتون':it.unit==='pack'?'باك':it.ps==='flash'?'عرض سريع':'عرض اليوم'} × {it.qty}</div></div><span style={{fontSize:13,fontWeight:700,color:'var(--p)'}}>{fp(pr*it.qty)} {CUR}</span></div>})}</div><div className="cd" style={{marginBottom:10,padding:14}}><div className="bkdn"><div className="bkdn-r"><span>المنتجات</span><span className="v">{fp(totals.productsTotal)} {CUR}</span></div>{totals.dealsTotal>0&&<div className="bkdn-r"><span>عروض اليوم</span><span className="v">{fp(totals.dealsTotal)} {CUR}</span></div>}{totals.flashTotal>0&&<div className="bkdn-r"><span>عروض سريعة</span><span className="v">{fp(totals.flashTotal)} {CUR}</span></div>}<div className="bkdn-r tot"><span>الإجمالي</span><span className="v">{fp(totals.totalAmount)} {CUR}</span></div></div></div><div className="cd" style={{marginBottom:10,padding:12,display:'flex',alignItems:'center',gap:8}}><I n="layers" s={18} c="var(--p)"/><div><div style={{fontSize:12,fontWeight:700}}>الشريحة: {tier.visible_label}</div><div style={{fontSize:10,color:'var(--tx3)'}}>{tier.discount_percent>0?`خصم ${tier.discount_percent}%`:'بدون خصم'}</div></div></div>{!ok&&<div className="note err-n" style={{marginBottom:10}}><I n="warning" s={14}/>{VE.chk(items,tier,totals).msg}</div>}<button className="bt bt-p bt-l bt-f" onClick={submit} disabled={sub||!ok} style={{marginBottom:14}}>{sub?'جارٍ الإرسال...':'تأكيد وإرسال الطلب'}</button></div></div>};

const OrdersPage=()=>{const orders=useS(orS,s=>s.orders);const disp=orders.length?orders:[{order_number:'ORD-3847',total_amount:1250,products_total:1100,deals_total:150,flash_total:0,workflow_status:'قيد التنفيذ',tier_name:'silver',created_at:new Date(NW-864e5).toISOString(),items_count:5},{order_number:'ORD-3821',total_amount:8750,products_total:8200,deals_total:350,flash_total:200,workflow_status:'تم التسليم',tier_name:'gold',created_at:new Date(NW-3*864e5).toISOString(),items_count:12},{order_number:'ORD-3790',total_amount:320,products_total:200,deals_total:120,flash_total:0,workflow_status:'تم التسليم',tier_name:'base',created_at:new Date(NW-7*864e5).toISOString(),items_count:3}];const sb=ws=>ws==='تم التسليم'?'bdg-ok':'bdg-a';return<div className="pg-in"><div className="sh" style={{paddingTop:14}}><h2>طلباتي</h2></div>{!disp.length?<div className="empty" style={{paddingTop:50}}><I n="receipt_long" s={56}/><h3>لا توجد طلبات</h3></div>:disp.map((o,i)=><div key={i} className="oc"><div className="oc-h"><span className="on">{o.order_number}</span><span className={`bdg-i ${sb(o.workflow_status)}`}>{o.workflow_status}</span></div><div className="oc-b"><div className="st"><div className="sv">{o.items_count||'-'}</div><div className="sl">عناصر</div></div><div className="st"><div className="sv">{TIERS.find(t=>t.tier_name===o.tier_name)?.visible_label||o.tier_name}</div><div className="sl">الشريحة</div></div><div className="st"><div className="sv">{new Date(o.created_at).toLocaleDateString('ar-EG')}</div><div className="sl">التاريخ</div></div></div><div className="oc-f"><span className="ot">{fp(o.total_amount)} {CUR}</span><span style={{fontSize:10,color:'var(--tx3)'}}>منتجات: {fp(o.products_total)}{o.deals_total>0?` | عروض: ${fp(o.deals_total)}`:''}{o.flash_total>0?` | فلاش: ${fp(o.flash_total)}`:''}</span></div></div>)}</div>};

// ═══ App + Router ═══
const App=()=>{const booted=useS(sess,s=>s.booted);const{route,nav}=useRtr();const{count}=useCart();React.useEffect(()=>{boot()},[]);if(!booted)return<div className="shell"><main className="main" style={{paddingBottom:0}}><BootScreen/></main></div>;const pp=match(route,'/product/:id');let page=null,showBN=true,showH=true;if(route==='/'||route==='')page=<HomePage/>;else if(route==='/products')page=<ProductsPage/>;else if(route==='/cart'){page=<CartPage nav={nav}/>;showBN=false}else if(route==='/checkout'){page=<CheckoutPage nav={nav}/>;showBN=false;showH=false}else if(route==='/orders')page=<OrdersPage/>;else if(pp){page=<ProdDetail id={pp.id} nav={nav}/>;showBN=false}else if(route==='/flash')page=<FlashPage/>;else if(route==='/deals')page=<DealsPage/>;else page=<HomePage/>;const tab=route==='/'?'home':route==='/products'?'products':route==='/cart'?'cart':route==='/orders'?'orders':'';return<div className="shell">{showH&&<header className="fhead"><button className="hbtn" onClick={()=>nav('/')}><I n="storefront" s={20}/></button><div className="logo">منصة التوزيع<small>B2B Commerce</small></div><button className="hbtn" onClick={()=>nav('/cart')}><I n="shopping_cart" s={20}/>{count>0&&<span className="bdg">{count>99?'99+':count}</span>}</button></header>}<main className="main">{page}</main>{showBN&&<nav className="bnav"><button className={`ni ${tab==='home'?'on':''}`} onClick={()=>nav('/')}><I n="storefront" s={22}/><span>الرئيسية</span></button><button className={`ni ${tab==='products'?'on':''}`} onClick={()=>nav('/products')}><I n="inventory_2" s={22}/><span>المنتجات</span></button><button className={`ni ${tab==='cart'?'on':''}`} onClick={()=>nav('/cart')}><I n="shopping_cart" s={22}/><span>السلة</span>{count>0&&<span className="nb">{count>99?'99+':count}</span>}</button><button className={`ni ${tab==='orders'?'on':''}`} onClick={()=>nav('/orders')}><I n="receipt_long" s={22}/><span>طلباتي</span></button></nav>}<Toasts/></div>};

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
