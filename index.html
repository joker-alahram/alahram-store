<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأهرام</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {font-family:'Cairo';margin:0;background:#eef2f7;padding-bottom:110px}

/* الهيدر */
header {
background:linear-gradient(135deg,#0b3d91,#1565c0);
color:#fff;
text-align:center;
}
.banner {width:100%;height:160px;object-fit:cover}

/* الشريط */
.ticker {
background:#0b3d91;
color:#fff;
overflow:hidden;
white-space:nowrap;
}
.ticker span {
display:inline-block;
padding:10px;
animation:scrollRTL 15s linear infinite;
}
@keyframes scrollRTL {
from{transform:translateX(-100%)}
to{transform:translateX(100%)}
}

/* رجوع */
.back-btn {
position:fixed;
top:10px;
left:10px;
background:#ff5722;
color:#fff;
padding:10px 12px;
border-radius:50px;
z-index:999;
font-size:14px;
}

/* البراند */
.card.brand {
background:#fff;
border-radius:20px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
cursor:pointer;
transition:.3s;
}
.card.brand:hover {transform:translateY(-5px)}

.brand-logo {
height:100px;
display:flex;
align-items:center;
justify-content:center;
}
.brand-logo img {
width:80%;
height:80%;
object-fit:contain;
}

.brand-name {
background:#f5f7fa;
padding:8px;
font-weight:bold;
}

/* المنتجات */
.card {background:#fff;padding:10px;border-radius:10px;text-align:center}
.card img {width:100%;height:100px;object-fit:contain}

.grid {
display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:12px;
padding:10px;
}

input,select {width:90%;margin:5px;padding:8px}

.bottom-bar {
position:fixed;
bottom:0;
width:100%;
background:#fff;
padding:10px;
display:flex;
justify-content:space-between;
border-top:1px solid #ddd;
}
</style>
</head>

<body>

<button class="back-btn" onclick="goBack()">⬅</button>

<header>
<img id="companyImage" class="banner">
<h2>الأهرام للتجارة والتوزيع</h2>
</header>

<div class="ticker"><span id="newsText"></span></div>

<div id="app"></div>

<div class="bottom-bar">
<div id="total">0 جنيه</div>
<button onclick="goReview()">مراجعة</button>
</div>

<script>
let data=[],cart={},historyStack=[];

// تحميل
fetch("https://sheetdb.io/api/v1/x342u61qs0xyu")
.then(res=>res.json())
.then(res=>{
data=res;

// صورة الشركة من الشيت
let img=data.find(p=>p.company_image)?.company_image;
if(img) document.getElementById("companyImage").src=img;

// الشريط
let news=data.find(p=>p.news)?.news;
if(news) document.getElementById("newsText").innerText=news;

showBrands();
});

// رجوع
function goBack(){
if(historyStack.length>0){
let last=historyStack.pop();
last();
}
}

// عرض البراندات
function showBrands(){
const app=document.getElementById("app");
app.innerHTML="";
historyStack=[];

let brands=[...new Set(data.map(p=>p.company))];

let grid=document.createElement("div");
grid.className="grid";

brands.forEach(b=>{
let logo=data.find(p=>p.company===b)?.brand_image;

let card=document.createElement("div");
card.className="card brand";

card.innerHTML=`
<div class="brand-logo">
<img src="${logo}">
</div>
<div class="brand-name">${b}</div>
`;

card.onclick=()=>{
historyStack.push(showBrands);
showProducts(b);
};

grid.appendChild(card);
});

app.appendChild(grid);
}

// المنتجات
function showProducts(company){
const app=document.getElementById("app");
app.innerHTML=`<h3 style="text-align:center">${company}</h3>`;

let list=data.filter(p=>p.company===company);

renderProducts(list);

historyStack.push(()=>showProducts(company));
}

// عرض المنتجات
function renderProducts(list){
const app=document.getElementById("app");

let grid=document.createElement("div");
grid.className="grid";

list.forEach(p=>{
let status=(p.status||"").trim();
let isAvailable=status!=="0";

let carton=parseFloat(p.price_carton);
let unit=parseFloat(p.price_unit);
let piece=parseFloat(p.price_piece);

let options="";
if(isAvailable){
if(!isNaN(carton)) options+=`<option data-price="${carton}">كرتونة</option>`;
if(!isNaN(unit)) options+=`<option data-price="${unit}">دستة</option>`;
if(!isNaN(piece)) options+=`<option data-price="${piece}">قطعة</option>`;
}

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${p.image}">
<h4>${p.name}</h4>
<div>سعر الكرتونة: ${carton||"-"}</div>

<select onchange="setUnit('${p.name}',this)">
<option disabled selected>اختر الوحدة</option>
${options}
</select>

<input type="number" placeholder="الكمية"
onchange="setQty('${p.name}',this.value)">
`;

grid.appendChild(card);
});

app.innerHTML="";
app.appendChild(grid);
}

// السلة
function setUnit(name,el){
let price=el.options[el.selectedIndex].getAttribute("data-price");
if(!cart[name]) cart[name]={};
cart[name].price=parseFloat(price);
updateTotal();
}

function setQty(name,qty){
qty=parseInt(qty);
if(qty>0){
if(!cart[name]) cart[name]={};
cart[name].qty=qty;
}else delete cart[name];

updateTotal();
}

// الإجمالي
function updateTotal(){
let total=0;
for(let i in cart){
let p=cart[i];
if(p.price && p.qty) total+=p.price*p.qty;
}
document.getElementById("total").innerText=total+" جنيه";
}

// مراجعة
function goReview(){
alert("صفحة الطلب موجودة عندك بالفعل");
}
</script>

</body>
</html>
